<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorPlayer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #screen { width:100vw; height:100vh; position:relative; background:#000; display:none; }
    .zone { position:absolute; overflow:hidden; background:#000; }
    .zone img, .zone video {
      position:absolute; top:0; left:0;
      width:100%; height:100%; object-fit:fill; display:block;
    }
    video::-webkit-media-controls { display:none !important; }
    video::-webkit-media-controls-overlay-cast-button { display:none !important; }
    #status {
      position:fixed; bottom:8px; right:12px; font-family:monospace; font-size:11px;
      color:rgba(255,255,255,0.4); z-index:9999; pointer-events:none;
      text-align:right; line-height:1.6;
    }
    #setup {
      position:fixed; inset:0; background:#0F172A;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-family:system-ui,sans-serif; color:#fff; padding:2rem; text-align:center;
      z-index:10000;
    }
    .spin {
      border:3px solid rgba(255,255,255,0.1); border-top:3px solid #3B82F6;
      border-radius:50%; width:32px; height:32px;
      animation:spin 1s linear infinite; margin-bottom:1rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #dbg {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.95); color:#0f0; font-family:monospace;
      font-size:12px; line-height:1.7; padding:10px;
      overflow-y:auto; z-index:99999; word-break:break-all;
      display:none;
    }
    #dbg .e { color:#f55; }
    #dbg .w { color:#fa0; }
    #dbg .o { color:#4f4; }
    #dbg .i { color:#8cf; }
    #dclose {
      position:fixed; top:6px; right:10px; background:#f55; color:#fff;
      border:none; border-radius:4px; font-size:13px; font-weight:bold;
      padding:4px 12px; cursor:pointer; z-index:100000;
    }
    #token-screen {
      position:fixed; inset:0; background:#0F172A;
      display:none; align-items:center; justify-content:center;
      font-family:system-ui,sans-serif; z-index:10001;
      padding:1.5rem; box-sizing:border-box; overflow-y:auto;
    }
    #token-screen .card {
      background:#1E293B; border:1px solid #334155; border-radius:16px;
      padding:2rem; width:100%; max-width:360px;
      display:flex; flex-direction:column; align-items:center;
    }
    #token-screen input {
      width:100%; padding:.6rem .85rem; border-radius:8px;
      border:1px solid #334155; background:#0F172A; color:#F1F5F9;
      font-size:.85rem; box-sizing:border-box; outline:none; font-family:monospace;
    }
    #token-screen button.connect-btn {
      margin-top:.75rem; padding:.65rem; border-radius:8px; border:none;
      background:#2563EB; color:#fff; font-weight:700; cursor:pointer;
      font-size:.9rem; font-family:inherit; width:100%;
    }
    #token-screen .divider {
      display:flex; align-items:center; gap:.75rem; width:100%; margin:1.25rem 0;
    }
    #token-screen .divider hr { flex:1; border:none; border-top:1px solid #334155; }
    #token-screen .divider span { color:#475569; font-size:.75rem; white-space:nowrap; }
    #tk-error {
      color:#FCA5A5; font-size:.78rem; display:none; margin-top:.45rem;
      background:#450a0a; border:1px solid #7f1d1d; border-radius:6px; padding:.45rem .7rem; width:100%;
    }
  </style>
</head>
<body>

  <!-- Panel debug visible al arrancar -->
  <div id="dbg"></div>
  <button id="dclose" onclick="document.getElementById('dbg').style.display='none';this.style.display='none'">✕ CERRAR</button>

  <!-- Pantalla de carga -->
  <div id="setup">
    <div class="spin"></div>
    <h2 id="st" style="font-size:1.4rem;margin-bottom:.5rem;">Conectando...</h2>
    <p  id="sm" style="color:#94A3B8;font-size:.95rem;">Iniciando GestorPlayer</p>
    <p  id="se" style="color:#fca5a5;font-size:.85rem;margin-top:.75rem;background:#7f1d1d;padding:.5rem .75rem;border-radius:6px;display:none;"></p>
  </div>

  <!-- Pantalla de conexión (QR + token manual) -->
  <div id="token-screen">
    <div class="card">

      <!-- Logo -->
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;">
        <div style="width:34px;height:34px;background:#2563EB;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <span style="font-weight:800;font-size:1.15rem;color:#F1F5F9;">GestorPlayer</span>
        <span style="font-size:.55rem;font-weight:700;background:#1e3a8a;color:#93C5FD;border:1px solid #1d4ed8;border-radius:4px;padding:2px 5px;">BETA</span>
      </div>

      <div style="height:1px;background:#334155;width:100%;margin-bottom:1.25rem;"></div>

      <!-- QR -->
      <p style="color:#F1F5F9;font-size:.9rem;font-weight:600;margin:0 0 .25rem;text-align:center;">Escanea con tu celular</p>
      <p style="color:#64748B;font-size:.78rem;margin:0 0 1rem;text-align:center;">Selecciona la pantalla desde el dashboard</p>

      <div id="qr-loading" style="color:#64748B;font-size:.82rem;padding:1.5rem 0;text-align:center;">Generando QR...</div>
      <div id="qr-ready" style="display:none;text-align:center;width:100%;">
        <img id="qr-img" src="" alt="QR" style="width:160px;height:160px;border-radius:10px;border:1px solid #334155;" />
        <p id="qr-status" style="color:#64748B;font-size:.78rem;margin:.6rem 0 0;">Esperando conexión...</p>
      </div>

      <!-- Divisor -->
      <div class="divider">
        <hr /><span>o ingresa el token</span><hr />
      </div>

      <!-- Input manual -->
      <div style="width:100%;">
        <input id="tk-input" type="text" placeholder="Pega el token aquí..." />
        <p id="tk-error">❌ Token inválido. Verifica e intenta de nuevo.</p>
        <button class="connect-btn" id="tk-btn">Conectar pantalla</button>
      </div>

    </div>
  </div>

  <div id="screen"></div>
  <div id="status">Iniciando...</div>

  <script>
    // ═══════════════════════════════════════════════
    //  CONFIGURACIÓN  ─  sin librerías externas
    // ═══════════════════════════════════════════════
    var URL_SB  = 'https://pekjgxyllilzfwkdyzmm.supabase.co'
    var KEY_SB  = 'sb_publishable_-AynaWSJE6vWcxCk9DpKgg_qyXOqcLu'
    var TOKEN   = ''  // se obtiene de localStorage o pantalla de emparejamiento

    // ═══════════════════════════════════════════════
    //  DEBUG
    // ═══════════════════════════════════════════════
    var dbgEl = document.getElementById('dbg')
    var dbgLines = []
    function dl(msg, t) {
      var h = new Date().toLocaleTimeString('es',{hour12:false})
      dbgLines.push('<div class="'+(t||'i')+'">['+h+'] '+esc(msg)+'</div>')
      if (dbgLines.length > 120) dbgLines.shift()
      dbgEl.innerHTML = dbgLines.join('')
      dbgEl.scrollTop = dbgEl.scrollHeight
      console.log(msg)
    }
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

    // ═══════════════════════════════════════════════
    //  UI HELPERS
    // ═══════════════════════════════════════════════
    var screenEl = document.getElementById('screen')
    var statusEl = document.getElementById('status')
    var setupEl  = document.getElementById('setup')
    function log(m)        { statusEl.textContent = m; dl(m) }
    function setTitle(m)   { document.getElementById('st').textContent = m }
    function setMsg(m)     { document.getElementById('sm').textContent = m }
    function showErr(m) {
      dl('ERROR: '+m,'e')
      setTitle('Sin conexión')
      setMsg('Reintentando en 5 segundos...')
      var e = document.getElementById('se')
      e.textContent = m; e.style.display='block'
      setTimeout(function(){ e.style.display='none'; startPlayer(activeToken) }, 5000)
    }

    // ═══════════════════════════════════════════════
    //  CLIENTE SUPABASE (fetch puro, sin librería)
    // ═══════════════════════════════════════════════
    var SB_HEADERS = {
      'apikey':        KEY_SB,
      'Authorization': 'Bearer ' + KEY_SB,
      'Content-Type':  'application/json',
      'Accept':        'application/json'
    }

    function sbUrl(table, params) {
      var q = Object.keys(params).map(function(k){
        return encodeURIComponent(k)+'='+encodeURIComponent(params[k])
      }).join('&')
      return URL_SB + '/rest/v1/' + table + (q ? '?'+q : '')
    }

    async function sbGet(table, params, single) {
      var p = Object.assign({ select:'*' }, params)
      if (single) p['limit'] = '1'
      try {
        var r = await withTimeout(fetch(sbUrl(table, p), { headers: SB_HEADERS }), 10000)
        var j = await r.json()
        if (!r.ok) { dl('sbGet '+table+' HTTP '+r.status+': '+JSON.stringify(j).slice(0,80),'e'); return { data:null, error:j } }
        var data = single ? (Array.isArray(j) ? j[0]||null : j) : (Array.isArray(j)?j:[j])
        dl('sbGet '+table+' → '+(single?'1 fila':data.length+' filas'),'o')
        return { data:data, error:null }
      } catch(e) {
        dl('sbGet '+table+' excepcion: '+e.message,'e')
        return { data:null, error:{ message:e.message } }
      }
    }

    async function sbInsert(table, row) {
      try {
        var r = await withTimeout(fetch(URL_SB+'/rest/v1/'+table, {
          method:'POST', headers:SB_HEADERS, body:JSON.stringify(row)
        }), 8000)
        if (!r.ok) { var j=await r.json(); dl('sbInsert '+table+' error: '+JSON.stringify(j).slice(0,60),'w') }
      } catch(e) { dl('sbInsert '+table+' excepcion: '+e.message,'w') }
    }

    async function sbDelete(table, eqKey, eqVal) {
      try {
        var url = URL_SB+'/rest/v1/'+table+'?'+encodeURIComponent(eqKey)+'=eq.'+encodeURIComponent(eqVal)
        await withTimeout(fetch(url, { method:'DELETE', headers:SB_HEADERS }), 8000)
      } catch(e) { dl('sbDelete excepcion: '+e.message,'w') }
    }

    async function sbUpdate(table, row, eqKey, eqVal) {
      try {
        var url = URL_SB+'/rest/v1/'+table+'?'+encodeURIComponent(eqKey)+'=eq.'+encodeURIComponent(eqVal)
        var r   = await withTimeout(fetch(url, { method:'PATCH', headers:SB_HEADERS, body:JSON.stringify(row) }), 8000)
        if (!r.ok) dl('sbUpdate '+table+' error HTTP '+r.status,'w')
        else dl('sbUpdate '+table+' OK','o')
      } catch(e) { dl('sbUpdate excepcion: '+e.message,'w') }
    }

    function storageUrl(path) {
      return URL_SB + '/storage/v1/object/public/media/' + path
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('Timeout '+ms+'ms')) }, ms) })
      ])
    }

    // ═══════════════════════════════════════════════
    //  LOCALSTORAGE CON FALLBACK
    // ═══════════════════════════════════════════════
    var _mem = {}
    function lsGet(k){ try{ return localStorage.getItem(k) }catch(e){ return _mem[k]||null } }
    function lsSet(k,v){ try{ localStorage.setItem(k,v) }catch(e){ _mem[k]=v } }
    function lsDel(k){ try{ localStorage.removeItem(k) }catch(e){ delete _mem[k] } }

    // ═══════════════════════════════════════════════
    //  ESTADO DEL PLAYER
    // ═══════════════════════════════════════════════
    var screenData  = null
    var zoneStates  = {}
    var isOnline    = true
    var activeToken = null

    // ═══════════════════════════════════════════════
    //  DIAGNÓSTICO AL INICIO
    // ═══════════════════════════════════════════════
    function envCheck() {
      dl('══ DIAGNÓSTICO ══','i')
      dl('UA: '+navigator.userAgent.slice(0,100),'i')
      dl('Online: '+navigator.onLine, navigator.onLine?'o':'e')
      dl('URL: '+window.location.href,'i')
      try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); dl('localStorage: OK','o') }
      catch(e) { dl('localStorage FALLA: '+e.message,'w') }
      dl('fetch: '+(typeof fetch!=='undefined'?'OK':'NO DISPONIBLE'),typeof fetch!=='undefined'?'o':'e')
      dl('Token guardado: '+(lsGet('device_token')||'(ninguno)'),'i')
      dl('Supabase URL: '+URL_SB,'i')
      dl('API Key (inicio): '+KEY_SB.slice(0,20)+'...','i')
      dl('══════════════════','i')
    }

    // ═══════════════════════════════════════════════
    //  CARGA DE CONTEOS
    // ═══════════════════════════════════════════════
    async function loadCounts() {
      var res = await sbGet('screen_content_counts',
        { 'screen_id': 'eq.'+screenData.id }, false)
      var counts={}, lastPlayed={}
      if (res.data) {
        res.data.forEach(function(r){
          counts[r.content_id]     = r.total_plays
          lastPlayed[r.content_id] = r.last_played_at ? new Date(r.last_played_at).getTime() : 0
        })
      }
      return { counts:counts, lastPlayed:lastPlayed }
    }

    // ═══════════════════════════════════════════════
    //  ALGORITMO DE PLAYLIST
    // ═══════════════════════════════════════════════
    function getNextItem(zoneId) {
      var state=zoneStates[zoneId], entries=state.entries
      var opH=screenData.operating_hours||20, now=Date.now(), total=entries.length
      if (!total) return null
      for (var i=0; i<total; i++) {
        var entry=entries[state.idx++%total]
        if (entry.kind==='item') {
          var it=entry.item
          if (!it.is_unlimited && it.daily_frequency) {
            if ((state.dc[it.id]||0)>=it.daily_frequency) continue
            if (now-(state.lp[it.id]||0)<(opH*3600000/it.daily_frequency)) continue
          }
          return { item:it, subName:null }
        }
        if (entry.kind==='sub' && entry.items && entry.items.length) {
          var sub=entry.sub
          if (!sub.is_unlimited && sub.daily_frequency) {
            if ((state.dc['s'+sub.id]||0)>=sub.daily_frequency) continue
            if (now-(state.lp['s'+sub.id]||0)<(opH*3600000/sub.daily_frequency)) continue
          }
          return { item:entry.items[entry.si++%entry.items.length], subName:sub.name }
        }
      }
      return null
    }

    // Mira qué viene después sin avanzar el estado
    function peekNextItem(zoneId) {
      var state=zoneStates[zoneId], entries=state.entries, total=entries.length
      if (!total) return null
      for (var i=0; i<total; i++) {
        var entry=entries[(state.idx+i)%total]
        if (entry.kind==='item') return entry.item
        if (entry.kind==='sub' && entry.items && entry.items.length)
          return entry.items[entry.si % entry.items.length]
      }
      return null
    }

    function playNext(zoneId) {
      var r=getNextItem(zoneId)
      if (!r) { setTimeout(function(){ playNext(zoneId) },5000); return }
      renderItem(zoneId, r.item, r.subName)
    }

    // Elimina todos los hijos excepto el último
    function clearOld(zEl) {
      while (zEl.children.length > 1) zEl.removeChild(zEl.children[0])
    }

    // Crea un <video> oculto y lo empieza a cargar en el DOM del zone
    function preloadNextVideo(zoneId) {
      var state = zoneStates[zoneId]
      if (state.preloaded) return          // ya hay uno precargando
      var next = peekNextItem(zoneId)
      if (!next || next.type !== 'video') return

      var url = storageUrl(next.storage_path)
      if (state.preloadedUrl === url) return  // ya es el mismo

      var vid = document.createElement('video')
      vid.src = url; vid.muted = true; vid.preload = 'auto'
      vid.setAttribute('webkit-playsinline','')
      vid.setAttribute('disableremoteplayback','')
      // Invisible, detrás del contenido actual
      vid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;opacity:0;pointer-events:none;z-index:0;'
      vid.load()

      var zEl = document.getElementById('zone-'+zoneId)
      if (zEl) zEl.insertBefore(vid, zEl.firstChild)  // detrás de todo

      state.preloaded    = vid
      state.preloadedUrl = url
      dl('Precargando: '+next.name.slice(0,25),'i')
    }

    function renderItem(zoneId, item, subName) {
      var zEl=document.getElementById('zone-'+zoneId); if (!zEl) return
      var state=zoneStates[zoneId]
      var url=storageUrl(item.storage_path)
      state.dc[item.id]=(state.dc[item.id]||0)+1
      state.lp[item.id]=Date.now()
      if (subName) { state.dc['s'+item.sub_playlist_id]=(state.dc['s'+item.sub_playlist_id]||0)+1; state.lp['s'+item.sub_playlist_id]=Date.now() }
      dl('▶ '+item.name.slice(0,30)+' ['+item.type+']','o')
      log('▶ '+item.name.slice(0,28))
      sbInsert('playback_events',{ screen_id:screenData.id, zone_id:zoneId, content_id:item.id })

      if (item.type==='image') {
        var img=document.createElement('img')
        img.onload=function(){
          zEl.appendChild(img)
          clearOld(zEl)
          // Precargar siguiente mientras muestra la imagen
          preloadNextVideo(zoneId)
          setTimeout(function(){ playNext(zoneId) },(item.duration_seconds||10)*1000)
        }
        img.onerror=function(){ dl('Error img: '+url.slice(0,50),'e'); setTimeout(function(){ playNext(zoneId) },3000) }
        img.src=url

      } else if (item.type==='url') {
        var ifr=document.createElement('iframe')
        ifr.src=item.url||''; ifr.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border:none;'
        ifr.allow='autoplay; fullscreen;'; ifr.setAttribute('allowfullscreen','')
        zEl.appendChild(ifr)
        clearOld(zEl)
        setTimeout(function(){ playNext(zoneId) },(item.duration_seconds||30)*1000)

      } else {
        // ── Video: usa el elemento precargado si coincide con la URL ──
        var vid
        if (state.preloaded && state.preloadedUrl === url) {
          vid = state.preloaded
          vid.style.opacity = '1'
          vid.style.zIndex  = ''
          dl('Usando elemento precargado ✓','o')
        } else {
          vid = document.createElement('video')
          vid.src=url; vid.preload='auto'
        }
        state.preloaded    = null
        state.preloadedUrl = null

        vid.muted=true; vid.autoplay=true; vid.playsInline=true
        vid.setAttribute('webkit-playsinline','')
        vid.setAttribute('disableremoteplayback','')

        vid.addEventListener('playing', function(){ clearOld(zEl) }, { once:true })
        setTimeout(function(){ clearOld(zEl) }, 600)

        vid.onended = function() {
          state.preloaded    = null
          state.preloadedUrl = null
          playNext(zoneId)
        }
        vid.onerror = function() {
          dl('Error vid: '+url.slice(0,50),'e')
          state.preloaded = null
          clearOld(zEl)
          setTimeout(function(){ playNext(zoneId) },3000)
        }

        // Precargar el siguiente en cuanto este empieza a reproducirse
        vid.addEventListener('playing', function(){
          preloadNextVideo(zoneId)
        }, { once:true })

        // También precargar cuando queden ~2s (para videos cortos)
        vid.addEventListener('timeupdate', function(){
          if (vid.duration && vid.currentTime >= vid.duration - 2) {
            preloadNextVideo(zoneId)
          }
        })

        zEl.appendChild(vid)
        vid.play().catch(function(e){ dl('play() rechazado: '+e.message,'w') })
      }
    }

    // ═══════════════════════════════════════════════
    //  LAYOUT
    // ═══════════════════════════════════════════════
    function buildLayout(program, zones) {
      screenEl.innerHTML=''
      var c=document.createElement('div')
      c.style.cssText='position:absolute;background:#000;width:100vw;height:100vh;left:0;top:0;overflow:hidden;'
      var sx=window.innerWidth/program.width, sy=window.innerHeight/program.height
      dl('Layout: prog '+program.width+'×'+program.height+' → escala x'+sx.toFixed(2)+' y'+sy.toFixed(2),'o')
      zones.forEach(function(z){
        var d=document.createElement('div')
        d.className='zone'; d.id='zone-'+z.id
        d.style.cssText='left:'+(z.x*sx)+'px;top:'+(z.y*sy)+'px;width:'+(z.width*sx)+'px;height:'+(z.height*sy)+'px;background:'+(z.background_color||'#000')+';'
        c.appendChild(d)
      })
      screenEl.appendChild(c)
    }

    // ═══════════════════════════════════════════════
    //  HEARTBEAT / POLLING
    // ═══════════════════════════════════════════════
    function startHeartbeat() {
      setInterval(function(){
        sbUpdate('screens',{ last_heartbeat:new Date().toISOString() },'id',screenData.id)
      },30000)
    }

    var lastPub = null
    function startPolling() {
      setInterval(async function(){
        if (!screenData.current_program_id) return
        var r=await sbGet('programs',{'id':'eq.'+screenData.current_program_id},true)
        if (r.error) { dl('Polling err: '+r.error.message,'w'); return }
        if (!isOnline) { isOnline=true; dl('Reconectado','o') }
        var pub=r.data && r.data.published_at
        if (lastPub===null) { lastPub=pub; return }
        if (pub && pub!==lastPub) { dl('Nueva publicación → recargando','o'); window.location.reload() }
      },30000)
    }

    // ═══════════════════════════════════════════════
    //  CARGA DEL PROGRAMA
    // ═══════════════════════════════════════════════
    async function loadProgram() {
      if (!screenData.current_program_id) {
        dl('Sin programa asignado','w'); setTitle('⚠ Sin programa'); setMsg('Asigna un programa en el dashboard'); return
      }
      dl('Cargando programa...','i')
      var pr=await sbGet('programs',{'id':'eq.'+screenData.current_program_id},true)
      if (pr.error||!pr.data) { showErr('Programa no encontrado: '+(pr.error?pr.error.message:'sin datos')); return }
      dl('Programa: '+pr.data.name,'o')
      lastPub = pr.data.published_at

      var zr=await sbGet('zones',{'program_id':'eq.'+pr.data.id,'order':'sort_order'},false)
      var zones=zr.data||[]
      if (!zones.length) { dl('Sin zonas','w'); setTitle('⚠ Sin zonas'); return }

      var saved=await loadCounts()

      for (var i=0;i<zones.length;i++) {
        var z=zones[i]
        var ir=await sbGet('media_content',{'zone_id':'eq.'+z.id,'sub_playlist_id':'is.null','order':'sort_order'},false)
        var sr=await sbGet('sub_playlists',{'zone_id':'eq.'+z.id,'order':'sort_order'},false)
        var subs=sr.data||[], subEntries=[]
        for (var j=0;j<subs.length;j++) {
          var siR=await sbGet('media_content',{'sub_playlist_id':'eq.'+subs[j].id,'order':'sort_order'},false)
          subEntries.push({ kind:'sub', sub:subs[j], items:siR.data||[], si:0, sort_order:subs[j].sort_order })
        }
        var combined=(ir.data||[]).map(function(it){ return { kind:'item', item:it, sort_order:it.sort_order } })
          .concat(subEntries).sort(function(a,b){ return a.sort_order-b.sort_order })
        zoneStates[z.id]={ entries:combined, dc:Object.assign({},saved.counts), lp:Object.assign({},saved.lastPlayed), idx:0 }
        dl('Zona '+z.id.slice(0,8)+': '+combined.length+' ítems','o')
      }

      buildLayout(pr.data, zones)

      // Arrancar reproducción y ocultar debug
      setupEl.style.display='none'
      screenEl.style.display='block'
      setTimeout(function(){
        dbgEl.style.display='none'
        document.getElementById('dclose').style.display='none'
      }, 4000)

      zones.forEach(function(z,idx){
        setTimeout(function(){
          if (zoneStates[z.id].entries.length) playNext(z.id)
          else dl('Zona '+z.id.slice(0,8)+' sin contenido','w')
        }, idx*300)
      })

      log('▶ '+pr.data.name+' · '+zones.length+' zona(s)')
    }

    // ═══════════════════════════════════════════════
    //  INICIO
    // ═══════════════════════════════════════════════
    async function startPlayer(token) {
      activeToken = token
      setTitle('Conectando...'); setMsg('Iniciando GestorPlayer')
      dl('Buscando pantalla con token: '+token.slice(0,12)+'...','i')

      if (typeof fetch==='undefined') {
        showErr('fetch() no disponible en este WebView — WebView demasiado antiguo')
        return
      }

      var res=await sbGet('screens',{'device_token':'eq.'+token},true)
      if (res.error||!res.data) {
        showErr(res.error ? res.error.message : 'Token no encontrado en Supabase')
        return
      }

      screenData=res.data
      dl('Pantalla: '+screenData.name,'o')
      log('✓ '+screenData.name)

      window.addEventListener('online',  function(){ isOnline=true;  dl('online','o') })
      window.addEventListener('offline', function(){ isOnline=false; dl('offline','e') })

      startHeartbeat()
      startPolling()
      await loadProgram()
    }

    // ═══════════════════════════════════════════════
    //  EMPAREJAMIENTO POR QR
    // ═══════════════════════════════════════════════
    var qrCode     = null
    var qrInterval = null

    async function startQRPairing() {
      qrCode = Math.random().toString(36).substring(2,8).toUpperCase()
      try {
        await sbInsert('device_pairings', { code: qrCode, token: null })
      } catch(e) {
        document.getElementById('qr-loading').textContent = 'Error creando código: '+e.message
        return
      }
      var pairUrl = 'https://gestorplayer.vercel.app/pair?code=' + qrCode
      dl('QR URL: '+pairUrl,'i')
      document.getElementById('qr-img').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=160x160&ecc=M&data='+encodeURIComponent(pairUrl)
      document.getElementById('qr-loading').style.display = 'none'
      document.getElementById('qr-ready').style.display   = 'block'

      qrInterval = setInterval(async function() {
        var r = await sbGet('device_pairings', { 'code':'eq.'+qrCode, 'select':'token' }, true)
        if (r.data && r.data.token) {
          clearInterval(qrInterval)
          var token = r.data.token
          sbDelete('device_pairings', 'code', qrCode)
          document.getElementById('qr-status').textContent = '✅ ¡Conectado! Arrancando...'
          document.getElementById('qr-status').style.color = '#4ade80'
          lsSet('device_token', token)
          setTimeout(function() {
            document.getElementById('token-screen').style.display = 'none'
            setupEl.style.display = 'flex'
            startPlayer(token)
          }, 1200)
        }
      }, 2000)
    }

    // ═══════════════════════════════════════════════
    //  ARRANQUE
    // ═══════════════════════════════════════════════
    async function init() {
      envCheck()

      // 1. localStorage
      var saved = lsGet('device_token')
      if (saved) { dl('Token desde localStorage: '+saved.slice(0,12)+'...','o'); startPlayer(saved); return }

      // 2. Token hardcodeado (fallback para dispositivos sin UI)
      if (TOKEN) { dl('Token hardcodeado','w'); startPlayer(TOKEN); return }

      // 3. Mostrar pantalla de emparejamiento
      dl('Sin token → mostrando pantalla de emparejamiento','w')
      setupEl.style.display = 'none'
      dbgEl.style.display = 'none'
      document.getElementById('dclose').style.display = 'none'
      var ts = document.getElementById('token-screen')
      ts.style.display = 'flex'
      startQRPairing()

      document.getElementById('tk-btn').addEventListener('click', async function() {
        var input = document.getElementById('tk-input').value.trim()
        if (!input) return
        document.getElementById('tk-btn').textContent = 'Conectando...'
        document.getElementById('tk-error').style.display = 'none'
        var res = await sbGet('screens', { 'device_token':'eq.'+input, 'select':'id,name' }, true)
        if (res.error || !res.data) {
          dl('Token inválido','e')
          document.getElementById('tk-error').style.display = 'block'
          document.getElementById('tk-btn').textContent = 'Conectar pantalla'
          return
        }
        dl('Token válido: '+res.data.name,'o')
        lsSet('device_token', input)
        if (qrInterval) { clearInterval(qrInterval); qrInterval = null }
        ts.style.display = 'none'
        setupEl.style.display = 'flex'
        startPlayer(input)
      })

      document.getElementById('tk-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('tk-btn').click()
      })
    }

    init()
  </script>
