<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorPlayer · Reproductor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #screen { width: 100vw; height: 100vh; position: relative; background: #000; display: none; }
    .zone { position: absolute; overflow: hidden; background: #000; }
    .zone img, .zone video { width: 100%; height: 100%; object-fit: fill; display: block; }

    #status {
      position: fixed; bottom: 8px; right: 12px;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.35); z-index: 9999;
      pointer-events: none; text-align: right; line-height: 1.6;
    }

    /* Pantalla de Error y QR */
    #setup-screen {
      position: fixed; inset: 0; background: #0F172A;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000; font-family: system-ui, -apple-system, sans-serif; color: #fff;
      padding: 2rem; text-align: center;
    }
    .qr-container {
      background: #fff; padding: 1rem; border-radius: 12px; margin: 1.5rem 0;
    }
    .error-box {
      background: #7f1d1d; color: #fecaca; padding: 1rem; border-radius: 8px;
      margin-top: 1rem; font-size: 0.9rem; max-width: 400px; display: none;
    }
    .loader {
      border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3B82F6;
      border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Pantalla de Carga / QR / Error -->
  <div id="setup-screen">
    <div id="loader" class="loader"></div>
    <h2 id="setup-title" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Conectando...</h2>
    <p id="setup-msg" style="color: #94A3B8; font-size: 1rem;">Iniciando GestorPlayer</p>

    <div id="qr-area" style="display: none;">
      <div class="qr-container">
        <!-- Usamos una API externa para generar el QR rápidamente sin librerías locales -->
        <img id="qr-img" src="" alt="Código QR" style="width: 200px; height: 200px;">
      </div>
      <p style="font-size: 0.9rem; color: #94A3B8; margin-bottom: 1rem;">Escanea para vincular esta pantalla</p>
      <code id="device-id-display" style="background: #1E293B; padding: 0.5rem; border-radius: 4px; font-size: 0.8rem;">ID: ...</code>
    </div>

    <div id="error-display" class="error-box"></div>
  </div>

  <div id="screen"></div>
  <div id="status">Iniciando...</div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://pekjgxyllilzfwkdyzmm.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_-AynaWSJE6vWcxCk9DpKgg_qyXOqcLu'
    const DEFAULT_TOKEN = 'c1c3991a-e306-4737-af94-016302d2b23a'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    })

    const screenEl    = document.getElementById('screen')
    const statusEl    = document.getElementById('status')
    const setupScreen = document.getElementById('setup-screen')
    const setupTitle  = document.getElementById('setup-title')
    const setupMsg    = document.getElementById('setup-msg')
    const errorBox    = document.getElementById('error-display')
    const qrArea      = document.getElementById('qr-area')
    const qrImg       = document.getElementById('qr-img')

    let screenData     = null
    let isOnline       = true
    const zoneStates   = {}

    function log(msg) {
      statusEl.textContent = msg
      console.log('[GestorPlayer]', msg)
    }

    function showError(msg) {
      document.getElementById('loader').style.display = 'block'
      setupTitle.textContent = 'Buscando conexión...'
      setupMsg.textContent   = msg
      errorBox.textContent   = 'Reintentando automáticamente en 5 segundos...'
      errorBox.style.display = 'block'

      console.log('[Retrying in 5s...]')
      setTimeout(() => {
        errorBox.style.display = 'none'
        const retryToken = localStorage.getItem('device_token') || DEFAULT_TOKEN;
        startPlayer(retryToken)
      }, 5000)
    }

    function showQR() {
      // Generamos un ID único para esta "sesión" o dispositivo si no tiene token
      let tempId = localStorage.getItem('temp_device_id') || Math.random().toString(36).substring(2, 10)
      localStorage.setItem('temp_device_id', tempId)

      qrArea.style.display = 'block'
      document.getElementById('device-id-display').textContent = 'ID: ' + tempId

      // La URL del QR enviará al usuario a una web donde podrá pegar el token para este tempId
      // Por ahora, usamos el token por defecto como sugerencia en el QR o la URL del dashboard
      const qrUrl = `https://gestor-player-web.vercel.app/bind?id=${tempId}`
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}`
    }

    async function startPlayer(token) {
      log('Identificando pantalla...')
      try {
        const { data, error } = await supabase.from('screens').select('*').eq('device_token', token).single()

        if (error || !data) {
          console.error('[Supabase Error]', error)
          showError(error ? error.message : 'Token no encontrado en la base de datos')
          return
        }

        screenData = data
        log('✓ ' + screenData.name)

        // Ocultar pantalla de carga
        setupScreen.style.display = 'none'
        screenEl.style.display    = 'block'

        // Iniciar lógica normal
        initPlayer()
      } catch (err) {
        showError('Error de red: ' + err.message)
      }
    }

    function initPlayer() {
      startHeartbeat()
      startPolling()
      subscribeToChanges()
      loadProgram()

      window.addEventListener('online',  () => log('🟢 Conectado'))
      window.addEventListener('offline', () => log('🔴 Sin conexión'))
    }

    // --- LÓGICA DE REPRODUCCIÓN (Mantenida de versiones anteriores) ---

    async function loadCounts() {
      const { data } = await supabase.from('screen_content_counts').select('content_id, total_plays, last_played_at').eq('screen_id', screenData.id)
      const counts = {}; const lastPlayed = {}
      if (data) {
        data.forEach(row => {
          counts[row.content_id] = row.total_plays
          lastPlayed[row.content_id] = row.last_played_at ? new Date(row.last_played_at).getTime() : 0
        })
      }
      return { counts, lastPlayed }
    }

    function getNextItem(zoneId) {
      const state = zoneStates[zoneId]; const entries = state.entries
      const opHours = screenData.operating_hours || 20; const now = Date.now(); const total = entries.length
      if (total === 0) return null
      for (let i = 0; i < total; i++) {
        const entry = entries[state.currentIndex++ % total]
        if (entry.kind === 'item') {
          const item = entry.item
          if (!item.is_unlimited && item.daily_frequency) {
            if ((state.dailyCounts[item.id] || 0) >= item.daily_frequency) continue
            if (now - (state.lastPlayedAt[item.id] || 0) < (opHours * 3600000 / item.daily_frequency)) continue
          }
          return { item, subName: null }
        }
        if (entry.kind === 'sub' && entry.items?.length > 0) {
          const sub = entry.sub
          if (!sub.is_unlimited && sub.daily_frequency) {
            if ((state.dailyCounts['sub_'+sub.id] || 0) >= sub.daily_frequency) continue
            if (now - (state.lastPlayedAt['sub_'+sub.id] || 0) < (opHours * 3600000 / sub.daily_frequency)) continue
          }
          const subItem = entry.items[entry.subIndex++ % entry.items.length]
          return { item: subItem, subName: sub.name }
        }
      }
      return null
    }

    function playNext(zoneId) {
      const result = getNextItem(zoneId)
      if (!result) { setTimeout(() => playNext(zoneId), 5000); return }
      renderItem(zoneId, result.item, result.subName)
    }

    function renderItem(zoneId, item, subName) {
      const zoneEl = document.getElementById('zone-' + zoneId); if (!zoneEl) return
      const state = zoneStates[zoneId]
      const url = supabase.storage.from('media').getPublicUrl(item.storage_path).data.publicUrl

      state.dailyCounts[item.id] = (state.dailyCounts[item.id] || 0) + 1
      state.lastPlayedAt[item.id] = Date.now()
      if (subName) {
        state.dailyCounts['sub_' + item.sub_playlist_id] = (state.dailyCounts['sub_' + item.sub_playlist_id] || 0) + 1
        state.lastPlayedAt['sub_' + item.sub_playlist_id] = Date.now()
      }

      supabase.from('playback_events').insert({ screen_id: screenData.id, zone_id: zoneId, content_id: item.id })

      zoneEl.innerHTML = ''
      if (item.type === 'url') {
        const iframe = document.createElement('iframe'); iframe.src = item.url || ''; iframe.style.cssText = 'width:100%;height:100%;border:none;';
        iframe.allow = 'autoplay; fullscreen;'; iframe.setAttribute('allowfullscreen', ''); zoneEl.appendChild(iframe);
        setTimeout(() => playNext(zoneId), (item.duration_seconds || 30) * 1000)
      } else if (item.type === 'image') {
        const img = document.createElement('img'); img.src = url; img.onload = () => setTimeout(() => playNext(zoneId), (item.duration_seconds || 10) * 1000);
        img.onerror = () => setTimeout(() => playNext(zoneId), 3000); zoneEl.appendChild(img)
      } else {
        const video = document.createElement('video'); video.src = url; video.muted = true; video.autoplay = true; video.playsInline = true;
        video.preload = 'auto'; video.poster = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        video.onended = () => playNext(zoneId); video.onerror = () => setTimeout(() => playNext(zoneId), 3000);
        zoneEl.appendChild(video); video.play().catch(() => {})
      }
    }

    async function loadProgram() {
      if (!screenData.current_program_id) return
      const progRes = await supabase.from('programs').select('*').eq('id', screenData.current_program_id).single()
      if (!progRes.data) return
      const zonesRes = await supabase.from('zones').select('*').eq('program_id', progRes.data.id).order('sort_order')
      const zones = zonesRes.data || []
      const saved = await loadCounts()

      for (const zone of zones) {
        const items = await supabase.from('media_content').select('*').eq('zone_id', zone.id).is('sub_playlist_id', null).order('sort_order')
        const subs = await supabase.from('sub_playlists').select('*').eq('zone_id', zone.id).order('sort_order')
        const subEntries = []
        for (const sub of (subs.data || [])) {
          const si = await supabase.from('media_content').select('*').eq('sub_playlist_id', sub.id).order('sort_order')
          subEntries.push({ kind: 'sub', sub, items: si.data || [], subIndex: 0, sort_order: sub.sort_order })
        }
        const combined = (items.data || []).map(i => ({ kind: 'item', item: i, sort_order: i.sort_order })).concat(subEntries).sort((a,b) => a.sort_order - b.sort_order)
        zoneStates[zone.id] = { entries: combined, dailyCounts: {...saved.counts}, lastPlayedAt: {...saved.lastPlayed}, currentIndex: 0 }
      }

      buildLayout(progRes.data, zones)
      zones.forEach((z, i) => setTimeout(() => zoneStates[z.id]?.entries.length > 0 && playNext(z.id), i * 300))
    }

    function buildLayout(program, zones) {
      screenEl.innerHTML = ''; const container = document.createElement('div'); container.id = 'program-container';
      container.style.cssText = 'position:absolute;background:#000;width:100vw;height:100vh;left:0;top:0;overflow:hidden;';
      const scaleX = window.innerWidth / program.width; const scaleY = window.innerHeight / program.height
      zones.forEach(z => {
        const div = document.createElement('div'); div.className = 'zone'; div.id = 'zone-' + z.id;
        div.style.cssText = `left:${z.x * scaleX}px;top:${z.y * scaleY}px;width:${z.width * scaleX}px;height:${z.height * scaleY}px;background:${z.background_color || '#000'};`;
        container.appendChild(div)
      }); screenEl.appendChild(container)
    }

    function startHeartbeat() { setInterval(() => supabase.from('screens').update({ last_heartbeat: new Date().toISOString() }).eq('id', screenData.id), 30000) }
    function startPolling() { setInterval(async () => { const res = await supabase.from('programs').select('published_at').eq('id', screenData.current_program_id).single(); if (res.data?.published_at) window.location.reload() }, 30000) }
    function subscribeToChanges() { supabase.channel('player-'+screenData.id).on('postgres_changes',{event:'UPDATE',schema:'public',table:'programs',filter:'id=eq.'+screenData.current_program_id},() => window.location.reload()).subscribe() }

    // --- INICIO ---
    const currentToken = localStorage.getItem('device_token') || DEFAULT_TOKEN;
    startPlayer(currentToken)
  </script>
</body>
</html>
