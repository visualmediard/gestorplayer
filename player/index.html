<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestPlayer · Reproductor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #screen { width: 100vw; height: 100vh; position: relative; background: #000; }
    .zone { position: absolute; overflow: hidden; background: #000; }
    .zone img, .zone video { width: 100%; height: 100%; object-fit: cover; display: block; }
    video::-webkit-media-controls { display: none !important; }
    video::-webkit-media-controls-overlay-cast-button { display: none !important; }
    /* Texto de estado y punto de conexión: ocultos en producción para no
       aparecer sobre el contenido en pantalla. Se re-muestran solo durante
       la carga inicial vía JS (clase .booting en el body). */
    #status {
      position: fixed; bottom: 8px; right: 12px;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.35); z-index: 9999;
      pointer-events: none; text-align: right; line-height: 1.6;
      white-space: pre-line;
      display: none;
    }
    #net-dot {
      position: fixed; top: 10px; right: 10px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #64748B; z-index: 9999; pointer-events: none;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      transition: background 0.3s ease;
      display: none;
    }
    #net-dot.online { background: #10B981; }
    /* Durante la carga inicial sí se ven, para diagnóstico. */
    body.booting #status, body.booting #net-dot { display: block; }
    /* ── Panel de diagnóstico (solo desarrollo) ── */
    #debug-panel { display: none; }
    #debug-toggle { display: none; }
  </style>
</head>

  <button id="debug-toggle" onclick="toggleDebug()">🔍 DEBUG</button>

    var debugPanel  = document.getElementById('debug-panel')
    var debugLines  = []
    var debugVisible = false

    function toggleDebug() {
      debugVisible = !debugVisible
      debugPanel.className = debugVisible ? 'visible' : ''
    }

    function dlog(msg, type) {
      var t    = new Date().toLocaleTimeString('es', { hour12: false })
      var cls  = 'log-' + (type || 'info')
      var line = '<div class="' + cls + '">[' + t + '] ' + escapeHtml(msg) + '</div>'
      debugLines.push(line)
      if (debugLines.length > 60) debugLines.shift()
      debugPanel.innerHTML = debugLines.join('')
      debugPanel.scrollTop = debugPanel.scrollHeight
      console.log('[GP]', msg)
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
    }

    var statusEl = document.getElementById('status')
    var screenEl = document.getElementById('screen')

    function log(msg) {
      statusEl.textContent = msg
      dlog(msg.replace(/\n/g, ' · '), 'info')
    }

    function clearTokenAndReload() {
      try { localStorage.removeItem('device_token') } catch(e) {}
      location.reload()
    }

    // localStorage con fallback (falla en file:// sin permisos)
    var _memStore = {}
    function lsGet(key) {
      try { return localStorage.getItem(key) } catch(e) { return _memStore[key] || null }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, val) } catch(e) { _memStore[key] = val }
    }
    function lsDel(key) {
      try { localStorage.removeItem(key) } catch(e) { delete _memStore[key] }
    }

    // ════════════════════════════════════════════════════════════
    //  INIT SUPABASE
    // ════════════════════════════════════════════════════════════

    var supabaseLib = window.supabase
    if (!supabaseLib) {
      dlog('ERROR CRÍTICO: Supabase no cargó desde CDN. Verifica conexión.', 'err')
    }

    var sb = null
    try {
      sb = supabaseLib.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: false, autoRefreshToken: false }
      })
      dlog('Supabase client creado OK', 'ok')
    } catch(e) {
      dlog('ERROR creando Supabase client: ' + e.message, 'err')
    }

    // Un storage_path puede ser una ruta de Supabase (archivos antiguos) o una
    // URL pública completa de Cloudflare R2 (archivos nuevos). Si ya es URL, se
    // usa tal cual; si no, se resuelve por Supabase. El caché offline funciona
    // igual con ambas porque cachea por URL final.
    function resolveMediaUrl(path) {
      if (!path) return ''
      if (/^https?:\/\//i.test(path)) return path
      return sb.storage.from('media').getPublicUrl(path).data.publicUrl
    }

    // ════════════════════════════════════════════════════════════
    //  HUELLA DEL DISPOSITIVO (device locking)
    //  Identifica de forma estable a este dispositivo para que un token
    //  solo pueda reproducir en el equipo que lo reclamó primero.
    // ════════════════════════════════════════════════════════════

    // Componentes estables del equipo. No pretende ser infalible, solo
    // suficientemente único y constante entre reinicios del mismo aparato.
    function computeFingerprintString() {
      var sw = (window.screen && screen.width)  || 0
      var sh = (window.screen && screen.height) || 0
      var hc = navigator.hardwareConcurrency || 0
      return [navigator.userAgent || '', sw + 'x' + sh, hc, canvasFingerprint()].join('|')
    }

    // Canvas fingerprint básico: el render de texto varía sutilmente por GPU/
    // drivers/fuentes, dando una firma extra. Si falla, se ignora.
    function canvasFingerprint() {
      try {
        var c = document.createElement('canvas')
        c.width = 200; c.height = 40
        var ctx = c.getContext('2d')
        if (!ctx) return 'nocanvas'
        ctx.textBaseline = 'top'
        ctx.font = "14px 'Arial'"
        ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20)
        ctx.fillStyle = '#069'; ctx.fillText('GestorPlayer·device', 2, 15)
        return c.toDataURL().slice(-72)
      } catch (e) { return 'nocanvas' }
    }

    // Hash SHA-256 (hex) del string. Usa crypto.subtle cuando está disponible
    // (contexto seguro), con fallback a un hash FNV-1a de 128 bits para
    // WebViews antiguos o file:// sin crypto.subtle. Devuelve una Promise.
    function hashFingerprint(str) {
      var hasSubtle = (typeof window !== 'undefined') && window.crypto &&
                      window.crypto.subtle && window.crypto.subtle.digest &&
                      (typeof TextEncoder !== 'undefined')
      if (hasSubtle) {
        try {
          var bytes = new TextEncoder().encode(str)
          return window.crypto.subtle.digest('SHA-256', bytes).then(function (buf) {
            var arr = Array.prototype.slice.call(new Uint8Array(buf))
            return arr.map(function (b) { return ('0' + b.toString(16)).slice(-2) }).join('')
          }, function () { return fnv1a128Hex(str) })
        } catch (e) { return Promise.resolve(fnv1a128Hex(str)) }
      }
      return Promise.resolve(fnv1a128Hex(str))
    }

    // Fallback determinista sin dependencias: cuatro acumuladores FNV-1a con
    // semillas distintas → 32 hex chars. No es criptográfico, pero basta para
    // distinguir dispositivos de forma estable.
    function fnv1a128Hex(str) {
      var seeds = [0x811c9dc5, 0x01000193, 0xdeadbeef, 0x9e3779b1]
      var h = seeds.slice()
      for (var i = 0; i < str.length; i++) {
        var ch = str.charCodeAt(i)
        for (var k = 0; k < 4; k++) {
          h[k] ^= ch
          h[k] = (h[k] + ((h[k] << 1) + (h[k] << 4) + (h[k] << 7) + (h[k] << 8) + (h[k] << 24))) >>> 0
        }
      }
      return h.map(function (x) { return ('00000000' + (x >>> 0).toString(16)).slice(-8) }).join('')
    }

    // device_id persistente en localStorage: se calcula una vez y se reutiliza.
    function getDeviceId() {
      var cached = lsGet('device_id')
      if (cached) return Promise.resolve(cached)
      return hashFingerprint(computeFingerprintString()).then(function (hex) {
        lsSet('device_id', hex)
        dlog('device_id generado: ' + hex.slice(0, 12) + '...', 'ok')
        return hex
      })
    }

    // Overlay de bloqueo: token ya activo en otro equipo.
    function showDeviceLockScreen() {
      stopAllZonesPlayback && stopAllZonesPlayback()
      var el = document.getElementById('device-lock')
      if (el) el.style.display = 'flex'
      document.body.classList.remove('booting')
    }

    // ════════════════════════════════════════════════════════════
    //  ESTADO DEL PLAYER
    // ════════════════════════════════════════════════════════════

    var screenData      = null
    var isOnline         = true
    var zoneStates       = {}
    var lastPublishedAt  = null

    // Estado adicional para reproducción offline
    var zoneObjectUrls  = {}   // zoneId -> última blob URL creada (para revocar)
    var zoneWatchdogs   = {}   // zoneId -> intervalId del vigilante anti-congelamiento
    var zoneFailStreak  = {}   // zoneId -> intentos fallidos consecutivos (offline sin caché)
    var countsDirty     = {}   // zoneId -> true si sus contadores cambiaron desde el último guardado
    var countsSaveTimer = null

    function setConnStatus(online) {
      isOnline = online
      var dot = document.getElementById('net-dot')
      if (dot) dot.className = online ? 'online' : ''
      log(online ? '🟢 Conectado' : '🔴 Sin conexión')
      dlog('Conexión: ' + (online ? 'ONLINE' : 'OFFLINE'), online ? 'ok' : 'warn')
      // Al recuperar conexión se envía el lote acumulado de inmediato,
      // sin esperar al ciclo de 10 minutos.
      if (online) flushBatch()
    }

    // ════════════════════════════════════════════════════════════
    //  ALMACENAMIENTO LOCAL — INDEXEDDB
    //  Guarda la playlist completa (zonas, contenido, frecuencias,
    //  vencimientos) y una cola de eventos pendientes de sincronizar.
    //  Así el player puede arrancar y seguir reproduciendo sin red.
    // ════════════════════════════════════════════════════════════

    var IDB_NAME    = 'gp_offline_db'
    var IDB_VERSION = 2   // v2: store 'media' para blobs de video/imagen
    var idbPromise  = null

    function idbOpen() {
      if (idbPromise) return idbPromise
      idbPromise = new Promise(function(resolve, reject) {
        if (!window.indexedDB) { reject(new Error('IndexedDB no soportado')); return }
        var req = indexedDB.open(IDB_NAME, IDB_VERSION)
        req.onupgradeneeded = function(e) {
          var db = e.target.result
          if (!db.objectStoreNames.contains('meta'))   db.createObjectStore('meta', { keyPath: 'key' })
          if (!db.objectStoreNames.contains('zones'))  db.createObjectStore('zones', { keyPath: 'zoneId' })
          if (!db.objectStoreNames.contains('counts')) db.createObjectStore('counts', { keyPath: 'zoneId' })
          if (!db.objectStoreNames.contains('events')) db.createObjectStore('events', { keyPath: 'id', autoIncrement: true })
          // Blobs de medios. IndexedDB SÍ persiste en WebView con file://
          // (a diferencia de la Cache API), garantizando caché entre recargas.
          if (!db.objectStoreNames.contains('media'))  db.createObjectStore('media', { keyPath: 'url' })
        }
        req.onsuccess = function(e) { resolve(e.target.result) }
        req.onerror   = function(e) { reject((e.target && e.target.error) || new Error('IDB open error')) }
      })
      return idbPromise
    }

    function idbStore(storeName, mode) {
      return idbOpen().then(function(db) {
        return db.transaction(storeName, mode).objectStore(storeName)
      })
    }

    function idbPut(storeName, value) {
      return idbStore(storeName, 'readwrite').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.put(value)
          r.onsuccess = function() { resolve(r.result) }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    function idbGet(storeName, key) {
      return idbStore(storeName, 'readonly').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.get(key)
          r.onsuccess = function() { resolve(r.result) }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    function idbGetAll(storeName) {
      return idbStore(storeName, 'readonly').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.getAll()
          r.onsuccess = function() { resolve(r.result || []) }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    // Solo las claves (sin traer los blobs completos → barato en memoria).
    function idbGetAllKeys(storeName) {
      return idbStore(storeName, 'readonly').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.getAllKeys()
          r.onsuccess = function() { resolve(r.result || []) }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    function idbDelete(storeName, key) {
      return idbStore(storeName, 'readwrite').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.delete(key)
          r.onsuccess = function() { resolve() }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    function idbCount(storeName) {
      return idbStore(storeName, 'readonly').then(function(store) {
        return new Promise(function(resolve, reject) {
          var r = store.count()
          r.onsuccess = function() { resolve(r.result) }
          r.onerror   = function() { reject(r.error) }
        })
      })
    }

    // ════════════════════════════════════════════════════════════
    //  CACHÉ DE MEDIOS — IndexedDB (primario) + Cache API (compat)
    //
    //  Cada video/imagen se descarga UNA sola vez y se guarda como Blob
    //  en IndexedDB (store 'media'), que persiste en WebView con file://
    //  a diferencia de la Cache API. En cada reproducción se sirve desde
    //  ese blob local → el único egress de red es la primera descarga.
    //
    //  La Cache API vieja ('gp-media-v1') se sigue LEYENDO como respaldo
    //  para material ya cacheado por la versión anterior (y se migra a
    //  IndexedDB al leerlo), pero ya NO se escribe nada nuevo en ella.
    // ════════════════════════════════════════════════════════════

    var MEDIA_CACHE_NAME     = 'gp-media-v1'
    var CACHE_API_OK         = (typeof caches !== 'undefined')
    var DOWNLOAD_CONCURRENCY = 2
    var downloadQueue        = []
    var downloadQueueSet     = {}
    var activeDownloads      = 0

    // Lectura de la Cache API vieja (solo respaldo/migración).
    function cacheApiGetBlob(url) {
      if (!CACHE_API_OK) return Promise.resolve(null)
      return caches.open(MEDIA_CACHE_NAME).then(function(cache) {
        return cache.match(url)
      }).then(function(res) {
        return res ? res.blob() : null
      }).catch(function() { return null })
    }

    // ¿El asset ya está en IndexedDB?
    function mediaHas(url) {
      return idbGet('media', url).then(function(row) {
        return !!(row && row.blob)
      }).catch(function() { return false })
    }

    // Devuelve el Blob local del asset o null. Orden: IndexedDB → Cache API
    // (migrando a IDB si se encuentra allí) → null.
    function mediaGetBlob(url) {
      return idbGet('media', url).then(function(row) {
        if (row && row.blob) return row.blob
        return cacheApiGetBlob(url).then(function(blob) {
          if (blob) {
            idbPut('media', { url: url, blob: blob, savedAt: Date.now() }).catch(function() {})
            dlog('Migrado de Cache API → IDB: ...' + url.slice(-32), 'info')
          }
          return blob
        })
      }).catch(function() { return null })
    }

    // Descargas en vuelo, para que el prefetch en segundo plano y el playNext
    // bajo demanda NO descarguen el mismo archivo dos veces: comparten la misma
    // promesa. Clave para el objetivo "cada video se descarga UNA sola vez".
    var inflightDownloads = {}

    // Descarga UNA vez y guarda el Blob en IndexedDB. Devuelve el Blob o null.
    function mediaDownloadAndStore(url) {
      if (inflightDownloads[url]) return inflightDownloads[url]

      var p = fetch(url).then(function(res) {
        if (!res || !res.ok) throw new Error('HTTP ' + (res && res.status))
        return res.blob()
      }).then(function(blob) {
        return idbPut('media', { url: url, blob: blob, savedAt: Date.now() })
          .then(function() {
            dlog('Descargado y guardado (IDB): ...' + url.slice(-40), 'ok')
            return blob
          }, function(e) {
            // Si el guardado falla (cuota), igual devolvemos el blob para
            // reproducir ahora; se reintentará guardar en la próxima.
            dlog('Descarga OK pero no se guardó (' + e.message + '): ...' + url.slice(-32), 'warn')
            return blob
          })
      }).catch(function(e) {
        dlog('Descarga falló (' + e.message + '): ...' + url.slice(-40), 'warn')
        return null
      })

      // Limpiar el registro al terminar (éxito o fallo) para permitir reintentos.
      inflightDownloads[url] = p
      p.then(function() { delete inflightDownloads[url] }, function() { delete inflightDownloads[url] })
      return p
    }

    // Precarga en segundo plano: descarga solo lo que aún no está en IDB.
    async function downloadOne(url) {
      var has = await mediaHas(url)
      if (has) return
      await mediaDownloadAndStore(url)
    }

    function enqueueDownload(url) {
      if (!url || downloadQueueSet[url]) return
      downloadQueueSet[url] = true
      downloadQueue.push(url)
      pumpDownloadQueue()
    }

    function pumpDownloadQueue() {
      while (activeDownloads < DOWNLOAD_CONCURRENCY && downloadQueue.length > 0) {
        (function(url) {
          activeDownloads++
          downloadOne(url).then(function() {
            delete downloadQueueSet[url]
            activeDownloads--
            pumpDownloadQueue()
          })
        })(downloadQueue.shift())
      }
    }

    function waitForDownloadQueueIdle(cb) {
      var check = setInterval(function() {
        if (activeDownloads === 0 && downloadQueue.length === 0) {
          clearInterval(check)
          cb()
        }
      }, 1000)
    }

    // Recolecta las URLs públicas de todo el contenido (items + sub-playlists)
    // que el programa actual necesita.
    function collectMediaUrls(zoneEntriesMap) {
      var urls = {}
      Object.keys(zoneEntriesMap).forEach(function(zoneId) {
        (zoneEntriesMap[zoneId] || []).forEach(function(entry) {
          var items = entry.kind === 'item' ? [entry.item] : (entry.items || [])
          items.forEach(function(it) {
            if (it && it.type !== 'url' && it.storage_path) {
              var u = resolveMediaUrl(it.storage_path)
              if (u) urls[u] = true
            }
          })
        })
      })
      return Object.keys(urls)
    }

    // Descarga en segundo plano solo lo NUEVO y, al terminar, purga del caché
    // (IDB + Cache API) lo que ya no se use.
    function enqueueAllMedia(zoneEntriesMap) {
      var urls = collectMediaUrls(zoneEntriesMap)

      // PRIORIDAD 4 — diagnóstico de storage: cuántos assets siguen en
      // Supabase Storage (egress pago) vs R2/externo (egress gratis).
      var supa = 0, r2 = 0
      urls.forEach(function(u) {
        if (/supabase\.co\/storage\//i.test(u)) supa++; else r2++
      })
      dlog('Assets del programa: ' + urls.length + ' · Supabase Storage: ' + supa +
           ' · R2/externo: ' + r2, supa > 0 ? 'warn' : 'ok')
      if (supa > 0) dlog('⚠ ' + supa + ' asset(s) aún en Supabase Storage: re-subirlos a R2 para eliminar ese egress', 'warn')

      urls.forEach(function(u) { enqueueDownload(u) })
      waitForDownloadQueueIdle(function() { purgeStaleMedia(urls) })
    }

    // Borra de IndexedDB (y de la Cache API vieja) los assets que ya no
    // pertenecen a la playlist actual. Devuelve una promesa que resuelve
    // cuando todas las eliminaciones terminaron.
    function purgeStaleMedia(validUrls) {
      var valid = {}
      validUrls.forEach(function(u) { valid[u] = true })

      var idbP = idbGetAllKeys('media').then(function(keys) {
        var stale = keys.filter(function(k) { return !valid[k] })
        if (stale.length) dlog('Purgando ' + stale.length + ' asset(s) obsoleto(s) de IDB', 'info')
        return Promise.all(stale.map(function(k) { return idbDelete('media', k).catch(function() {}) }))
      }).catch(function() {})

      var cacheP = Promise.resolve()
      if (CACHE_API_OK) {
        cacheP = caches.open(MEDIA_CACHE_NAME).then(function(cache) {
          return cache.keys().then(function(reqs) {
            return Promise.all(reqs.map(function(r) { return valid[r.url] ? null : cache.delete(r) }))
          })
        }).catch(function() {})
      }

      return Promise.all([idbP, cacheP])
    }

    // ════════════════════════════════════════════════════════════
    //  SNAPSHOT LOCAL (playlist + contadores)
    // ════════════════════════════════════════════════════════════

    function persistSnapshot(program, zonesRaw, zoneEntriesMap) {
      idbPut('meta', {
        key: 'state',
        screenId: screenData.id,
        program: {
          id: program.id, name: program.name, width: program.width, height: program.height,
          published_at: program.published_at, updated_at: program.updated_at,
        },
        publishedAt: program.published_at || program.updated_at,
        operating_start: screenData.operating_start || null,
        operating_end:   screenData.operating_end   || null,
        savedAt: Date.now(),
      }).catch(function(e) { dlog('No se pudo guardar snapshot (meta): ' + e.message, 'warn') })

      zonesRaw.forEach(function(zone) {
        idbPut('zones', {
          zoneId: zone.id,
          zone: {
            id: zone.id, name: zone.name, x: zone.x, y: zone.y,
            width: zone.width, height: zone.height, background_color: zone.background_color,
            fit_mode: zone.fit_mode || 'cover',
          },
          entries: zoneEntriesMap[zone.id] || [],
          savedAt: Date.now(),
        }).catch(function(e) { dlog('No se pudo guardar zona ' + zone.id.slice(0,6) + ': ' + e.message, 'warn') })
      })

      // Limpia zonas que ya no pertenecen a este programa (borradas, etc.)
      var validIds = {}
      zonesRaw.forEach(function(z) { validIds[z.id] = true })
      idbGetAll('zones').then(function(rows) {
        rows.forEach(function(r) {
          if (!validIds[r.zoneId]) idbDelete('zones', r.zoneId).catch(function() {})
        })
      }).catch(function() {})
    }

    // Actualiza solo el horario operativo dentro del snapshot meta, sin
    // reescribir el programa. Se llama al detectar un cambio en caliente.
    function persistScreenMeta() {
      idbGet('meta', 'state').then(function(row) {
        if (!row) return
        row.operating_start = screenData.operating_start || null
        row.operating_end   = screenData.operating_end   || null
        idbPut('meta', row).catch(function() {})
      }).catch(function() {})
    }

    // Guarda los contadores de reproducción con un pequeño retraso (evita
    // escribir en disco en cada frame) para que sobrevivan a un apagón.
    function persistCountsDebounced(zoneId) {
      countsDirty[zoneId] = true
      if (countsSaveTimer) return
      countsSaveTimer = setTimeout(function() {
        countsSaveTimer = null
        var toSave = Object.keys(countsDirty)
        countsDirty = {}
        toSave.forEach(function(zid) {
          var st = zoneStates[zid]
          if (!st) return
          idbPut('counts', { zoneId: zid, dailyCounts: st.dailyCounts, lastPlayedAt: st.lastPlayedAt })
            .catch(function(e) { dlog('No se pudo guardar contadores de zona ' + zid.slice(0,6) + ': ' + e.message, 'warn') })
        })
      }, 4000)
    }

    // ════════════════════════════════════════════════════════════
    //  BATCHING DE REPRODUCCIONES
    //  En vez de un INSERT por reproducción, se acumulan en memoria
    //  (agrupadas por content|zone con un contador) y se envían en UN
    //  solo INSERT cada 10 minutos, al volver online o al ocultar la app.
    //  El lote se espeja en IndexedDB (escritura local, sin red) para que
    //  un corte de luz no pierda nada aunque nunca dispare beforeunload.
    //  Requiere la columna playback_events.count (migración 20260721).
    // ════════════════════════════════════════════════════════════

    var FLUSH_INTERVAL_MS = 10 * 60 * 1000
    var batchMap       = {}    // 'content|zone' → {screen_id, zone_id, content_id, played_at, count}
    var batchSaveTimer = null
    var flushingNow    = false

    function addToBatch(evt) {
      var key = evt.content_id + '|' + evt.zone_id
      var row = batchMap[key]
      if (row) {
        row.count    += 1
        row.played_at = evt.played_at   // se conserva la última reproducción
      } else {
        batchMap[key] = {
          screen_id: evt.screen_id, zone_id: evt.zone_id,
          content_id: evt.content_id, played_at: evt.played_at, count: 1,
        }
      }
      persistBatchDebounced()
    }

    // Espejo local del lote en IndexedDB (debounce 2s para no escribir en
    // cada reproducción). Es disco local: no genera tráfico de red.
    function persistBatchNow() {
      var rows = Object.keys(batchMap).map(function(k) { return batchMap[k] })
      return idbPut('meta', { key: 'pending_batch', rows: rows, savedAt: Date.now() })
        .catch(function(e) { dlog('No se pudo persistir el lote: ' + e.message, 'warn') })
    }

    function persistBatchDebounced() {
      if (batchSaveTimer) return
      batchSaveTimer = setTimeout(function() { batchSaveTimer = null; persistBatchNow() }, 2000)
    }

    // Envía todo el lote acumulado en UN solo INSERT. Si falla, el lote se
    // conserva intacto y se reintenta en el próximo ciclo / evento online.
    function flushBatch() {
      if (flushingNow || !isOnline || !sb) return
      var keys = Object.keys(batchMap)
      if (!keys.length) return
      flushingNow = true
      var payload = keys.map(function(k) {
        var r = batchMap[k]
        return { screen_id: r.screen_id, zone_id: r.zone_id, content_id: r.content_id, played_at: r.played_at, count: r.count }
      })
      dlog('Enviando lote de reproducciones: ' + payload.length + ' fila(s)...', 'info')
      sb.from('playback_events').insert(payload).then(function(res) {
        if (res.error) {
          dlog('Lote falló (' + res.error.message + ') — se conserva para reintentar', 'warn')
          flushingNow = false
          return
        }
        // Descuenta lo enviado; lo reproducido DURANTE el envío queda para
        // el próximo lote (no se pierde ni se duplica).
        payload.forEach(function(p) {
          var key = p.content_id + '|' + p.zone_id
          var row = batchMap[key]
          if (!row) return
          if (row.count <= p.count) delete batchMap[key]
          else row.count -= p.count
        })
        persistBatchNow()
        dlog('Lote sincronizado OK (' + payload.length + ' fila(s))', 'ok')
        flushingNow = false
      }).catch(function(e) {
        dlog('Lote: excepción ' + e.message + ' — se conserva', 'warn')
        flushingNow = false
      })
    }

    // Al arrancar: recupera el lote persistido del arranque anterior y migra
    // la cola antigua del store 'events' (versiones previas del player).
    function restorePendingBatch() {
      return idbGet('meta', 'pending_batch').then(function(row) {
        var rows = (row && row.rows) || []
        rows.forEach(function(r) {
          var key = r.content_id + '|' + r.zone_id
          var ex  = batchMap[key]
          if (ex) {
            ex.count += (r.count || 1)
            if ((r.played_at || '') > (ex.played_at || '')) ex.played_at = r.played_at
          } else {
            batchMap[key] = {
              screen_id: r.screen_id, zone_id: r.zone_id,
              content_id: r.content_id, played_at: r.played_at, count: r.count || 1,
            }
          }
        })
        if (rows.length) dlog('Lote pendiente recuperado: ' + rows.length + ' fila(s)', 'info')
      }).catch(function() {}).then(function() {
        return idbGetAll('events').catch(function() { return [] })
      }).then(function(old) {
        if (!old || !old.length) return
        dlog('Migrando cola antigua al lote: ' + old.length + ' evento(s)', 'info')
        old.forEach(function(o) {
          addToBatch({ screen_id: o.screen_id, zone_id: o.zone_id, content_id: o.content_id, played_at: o.played_at })
        })
        return Promise.all(old.map(function(o) { return idbDelete('events', o.id) })).catch(function() {})
      }).catch(function() {})
    }

    function startEventSync() {
      // Pendientes del arranque anterior → envío inicial único.
      restorePendingBatch().then(function() { flushBatch() })
      // Único intervalo de red del batching: un lote cada 10 minutos.
      setInterval(flushBatch, FLUSH_INTERVAL_MS)
      // Al ocultar/cerrar la app: persistir de inmediato e intentar enviar.
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') { persistBatchNow(); flushBatch() }
      })
      window.addEventListener('beforeunload', function() { persistBatchNow() })
    }

    // ════════════════════════════════════════════════════════════
    //  TOKEN
    // ════════════════════════════════════════════════════════════

    function getDeviceToken() {
      // 1. URL param
      try {
        var params   = new URLSearchParams(window.location.search)
        var urlToken = params.get('token')
        if (urlToken) {
          dlog('Token desde URL: ' + urlToken.slice(0,12) + '...', 'ok')
          lsSet('device_token', urlToken)
          return urlToken
        }
      } catch(e) {
        dlog('Error leyendo URL params: ' + e.message, 'warn')
      }

      // 2. localStorage
      try {
        var saved = lsGet('device_token')
        if (saved) {
          dlog('Token desde localStorage: ' + saved.slice(0,12) + '...', 'ok')
          return saved
        }
      } catch(e) {
        dlog('Error leyendo localStorage: ' + e.message, 'warn')
      }

      // 3. Token hardcodeado (para dispositivos sin UI de configuración)
      if (HARDCODED_TOKEN) {
        dlog('Usando token hardcodeado: ' + HARDCODED_TOKEN.slice(0,12) + '...', 'warn')
        return HARDCODED_TOKEN
      }

      dlog('Sin token disponible → mostrando pantalla de ingreso', 'warn')
      return null
    }

    // ════════════════════════════════════════════════════════════
    //  CARGA DE DATOS
    // ════════════════════════════════════════════════════════════

    async function loadCounts() {
      try {
        var res = await sb.from('screen_content_counts')
          .select('content_id, total_plays, last_played_at')
          .eq('screen_id', screenData.id)
        var counts     = {}
        var lastPlayed = {}
        if (res.error) {
          dlog('loadCounts error: ' + res.error.message, 'warn')
        } else if (res.data) {
          res.data.forEach(function(row) {
            counts[row.content_id]     = row.total_plays
            lastPlayed[row.content_id] = row.last_played_at ? new Date(row.last_played_at).getTime() : 0
          })
          dlog('loadCounts OK: ' + res.data.length + ' registros', 'ok')
        }
        return { counts: counts, lastPlayed: lastPlayed }
      } catch(e) {
        dlog('loadCounts excepción: ' + e.message, 'err')
        return { counts: {}, lastPlayed: {} }
      }
    }

    // ════════════════════════════════════════════════════════════
    //  PROGRAMACIÓN POR DÍAS Y HORAS
    //  Se evalúa con la hora LOCAL del dispositivo (funciona offline).
    //  schedule_days: array formato Date.getDay() (0=domingo ... 6=sábado)
    //  schedule_start / schedule_end: 'HH:MM' o 'HH:MM:SS'
    //  Sin restricciones => siempre activo (comportamiento por defecto).
    // ════════════════════════════════════════════════════════════

    function parseTimeToMinutes(t) {
      if (!t) return null
      var parts = String(t).split(':')
      if (parts.length < 2) return null
      var h = parseInt(parts[0], 10)
      var m = parseInt(parts[1], 10)
      if (isNaN(h) || isNaN(m)) return null
      return h * 60 + m
    }

    // Un contenido con fecha de vencimiento deja de reproducirse al terminar
    // ese día. La fecha se parsea como fecha LOCAL del dispositivo (no UTC),
    // así "vence hoy" sigue válido hasta las 23:59:59 locales sin adelantarse
    // un día en zonas horarias detrás de UTC (ej. RD, UTC-4).
    function isExpired(item) {
      if (!item || !item.expires_at) return false
      var parts = String(item.expires_at).slice(0, 10).split('-')
      if (parts.length < 3) return false
      var y = parseInt(parts[0], 10), mo = parseInt(parts[1], 10) - 1, d = parseInt(parts[2], 10)
      if (isNaN(y) || isNaN(mo) || isNaN(d)) return false
      var expiry = new Date(y, mo, d, 23, 59, 59, 999)
      return new Date() > expiry
    }

    function isWithinSchedule(item) {
      if (!item) return true
      var days  = item.schedule_days
      var start = item.schedule_start
      var end   = item.schedule_end

      var hasDays = days && days.length
      var hasTime = start && end
      if (!hasDays && !hasTime) return true   // sin restricción

      var now = new Date()

      // Días de la semana (hora local del dispositivo)
      if (hasDays && days.indexOf(now.getDay()) === -1) return false

      // Rango horario
      if (hasTime) {
        var s = parseTimeToMinutes(start)
        var e = parseTimeToMinutes(end)
        if (s === null || e === null) return true
        var mins = now.getHours() * 60 + now.getMinutes()
        if (s <= e) {
          // Rango normal dentro del mismo día (ej. 06:00 a 22:00)
          if (mins < s || mins >= e) return false
        } else {
          // Rango que cruza la medianoche (ej. 22:00 a 06:00)
          if (mins < s && mins >= e) return false
        }
      }
      return true
    }

    // ════════════════════════════════════════════════════════════
    //  HORARIO OPERATIVO DE LA PANTALLA
    //  Ventana en que la pantalla reproduce y cuenta estadísticas. Fuera de
    //  ella: pantalla negra limpia y sin registro de reproducciones. Usa la
    //  hora LOCAL del dispositivo, así funciona offline. Soporta cruce de
    //  medianoche (ej. 06:00 a 02:00).
    // ════════════════════════════════════════════════════════════

    var operatingActive = true

    function isWithinOperatingHours() {
      if (!screenData) return true
      var start = screenData.operating_start
      var end   = screenData.operating_end
      if (!start || !end) return true      // sin restricción → siempre activa
      var s = parseTimeToMinutes(start)
      var e = parseTimeToMinutes(end)
      if (s === null || e === null) return true
      if (s === e) return true             // ventana de 24h
      var now  = new Date()
      var mins = now.getHours() * 60 + now.getMinutes()
      if (s < e) return mins >= s && mins < e          // mismo día
      return mins >= s || mins < e                     // cruza medianoche
    }

    function showOffHoursScreen() {
      var el = document.getElementById('offhours')
      if (el) el.style.display = 'block'
    }
    function hideOffHoursScreen() {
      var el = document.getElementById('offhours')
      if (el) el.style.display = 'none'
    }

    // Detiene y limpia toda reproducción (videos/imágenes) de todas las zonas.
    // Incrementa la generación de cada zona para invalidar cualquier cadena
    // pendiente (timeouts/onended): al reanudar con resumeAllZones se arranca
    // una sola cadena limpia por zona, sin riesgo de reproducción doble.
    function stopAllZonesPlayback() {
      Object.keys(zoneStates).forEach(function(zoneId) {
        if (zoneStates[zoneId]) zoneStates[zoneId].gen = (zoneStates[zoneId].gen || 0) + 1
        clearVideoWatchdog(zoneId)
        if (zoneObjectUrls[zoneId]) {
          URL.revokeObjectURL(zoneObjectUrls[zoneId])
          zoneObjectUrls[zoneId] = null
        }
        var zoneEl = document.getElementById('zone-' + zoneId)
        if (zoneEl) zoneEl.innerHTML = ''
      })
    }

    function resumeAllZones() {
      Object.keys(zoneStates).forEach(function(zoneId) {
        if (zoneStates[zoneId] && zoneStates[zoneId].entries.length > 0) playNext(zoneId)
      })
    }

    // Estado inicial (llamado antes del primer playNext para no parpadear).
    function initOperatingState() {
      operatingActive = isWithinOperatingHours()
      if (!operatingActive) {
        showOffHoursScreen()
        dlog('Arranque fuera de horario operativo → pantalla negra', 'warn')
      }
    }

    // Chequeo periódico: solo actúa en las transiciones dentro↔fuera.
    function applyOperatingState() {
      var active = isWithinOperatingHours()
      if (active === operatingActive) return
      operatingActive = active
      if (!active) {
        dlog('Fuera de horario operativo → pantalla negra', 'warn')
        showOffHoursScreen()
        stopAllZonesPlayback()
      } else {
        dlog('Dentro de horario operativo → reanudando reproducción', 'ok')
        hideOffHoursScreen()
        resumeAllZones()
      }
    }

    function startOperatingWatch() {
      setInterval(applyOperatingState, 30000)
    }

    // ════════════════════════════════════════════════════════════
    //  ALGORITMO DE PLAYLIST
    // ════════════════════════════════════════════════════════════

    function getNextItem(zoneId) {
      var state   = zoneStates[zoneId]
      var entries = state.entries
      var opHours = screenData.operating_hours || 20
      var now     = Date.now()
      var total   = entries.length
      if (total === 0) return null

      for (var attempt = 0; attempt < total; attempt++) {
        var idx   = state.currentIndex % total
        state.currentIndex++
        var entry = entries[idx]

        if (entry.kind === 'item') {
          var item = entry.item
          // Vencido → nunca se reproduce.
          if (isExpired(item)) continue
          // Fuera de su horario programado → saltar a la siguiente entrada.
          if (!isWithinSchedule(item)) continue
          if (!item.is_unlimited && item.daily_frequency) {
            var played = state.dailyCounts[item.id] || 0
            if (played >= item.daily_frequency) continue
            var intervalMs = (opHours * 3600 * 1000) / item.daily_frequency
            var elapsed    = now - (state.lastPlayedAt[item.id] || 0)
            if (elapsed < intervalMs) continue
          }
          return { item: item, subName: null }
        }

        if (entry.kind === 'sub') {
          var sub      = entry.sub
          var subItems = entry.items
          if (!subItems || subItems.length === 0) continue
          if (!sub.is_unlimited && sub.daily_frequency) {
            var subPlayed   = state.dailyCounts['sub_' + sub.id] || 0
            if (subPlayed >= sub.daily_frequency) continue
            var subInterval = (opHours * 3600 * 1000) / sub.daily_frequency
            var subElapsed  = now - (state.lastPlayedAt['sub_' + sub.id] || 0)
            if (subElapsed < subInterval) continue
          }
          var subItem = subItems[entry.subIndex % subItems.length]
          entry.subIndex++
          // Si el video elegido está vencido o fuera de su horario, saltar.
          if (isExpired(subItem)) continue
          if (!isWithinSchedule(subItem)) continue
          return { item: subItem, subName: sub.name }
        }
      }
      return null
    }

    // ════════════════════════════════════════════════════════════
    //  REPRODUCCIÓN — sirve SIEMPRE desde el blob local (IndexedDB).
    //
    //  Regla de egress (una sola descarga por video):
    //    · En caché  → se sirve el blob local (sin red).
    //    · Sin caché + online → UNA descarga vía fetch, se guarda en IDB,
    //      y recién entonces se asigna el blob a video.src. Nunca se hace
    //      streaming directo desde Storage a video.src.
    //    · Sin caché + offline → se salta al siguiente ítem.
    //
    //  Guardia de "generación": cada zona tiene un contador `gen`. Toda
    //  continuación de la cadena (timeouts, onended, watchdog) verifica que
    //  la generación siga vigente. Así una resincronización suave puede
    //  matar cadenas viejas sin recargar la página (evita reproducción doble).
    // ════════════════════════════════════════════════════════════

    function zoneAlive(zoneId, gen) {
      return !!(zoneStates[zoneId] && zoneStates[zoneId].gen === gen)
    }

    // Programa la próxima reproducción solo si la generación sigue vigente.
    function laterPlayNext(zoneId, gen, ms) {
      setTimeout(function() { if (zoneAlive(zoneId, gen)) playNext(zoneId) }, ms)
    }

    async function playNext(zoneId) {
      var state = zoneStates[zoneId]
      if (!state) return               // zona eliminada por una resync
      var gen = state.gen

      // Fuera del horario operativo la cadena se detiene aquí; applyOperatingState
      // la reanuda con resumeAllZones() cuando vuelve a estar dentro de horario.
      if (!operatingActive) return

      var result = getNextItem(zoneId)
      if (!result) {
        // Nada reproducible ahora mismo (todo fuera de horario o con su cuota
        // diaria cumplida). No se congela: espera 60s y reintenta, de modo que
        // cuando se abra la ventana horaria el contenido reanuda solo.
        dlog('Zona ' + zoneId.slice(0,6) + ': sin contenido en horario, reintento en 60s', 'info')
        laterPlayNext(zoneId, gen, 60000)
        return
      }
      var item    = result.item
      var subName = result.subName

      // Los streams tipo URL no se cachean (son contenido en vivo/externo).
      if (item.type === 'url') {
        zoneFailStreak[zoneId] = 0
        renderItem(zoneId, item, subName, item.url || '', gen)
        return
      }

      var publicUrl = item.storage_path ? resolveMediaUrl(item.storage_path) : null
      if (!publicUrl) { laterPlayNext(zoneId, gen, 500); return }

      // 1) ¿Está ya en local (IndexedDB → Cache API)?
      var blob = await mediaGetBlob(publicUrl)
      if (!zoneAlive(zoneId, gen)) return   // una resync ocurrió durante el await

      // 2) No está y hay red: UNA sola descarga → guardar → servir el blob.
      if (!blob && isOnline) {
        dlog('Primera vez sin caché → descargando: ' + item.name, 'info')
        blob = await mediaDownloadAndStore(publicUrl)
        if (!zoneAlive(zoneId, gen)) return
      }

      if (!blob) {
        // Sin local y (offline o la descarga falló): saltar al siguiente.
        dlog('Sin blob local para "' + item.name + '" (offline o descarga falló), saltando', 'warn')
        zoneFailStreak[zoneId] = (zoneFailStreak[zoneId] || 0) + 1
        var wait = zoneFailStreak[zoneId] > 3 ? 5000 : 500
        laterPlayNext(zoneId, gen, wait)
        return
      }

      zoneFailStreak[zoneId] = 0
      renderItem(zoneId, item, subName, URL.createObjectURL(blob), gen)
    }

    function renderItem(zoneId, item, subName, srcUrl, gen) {
      var zoneEl = document.getElementById('zone-' + zoneId)
      if (!zoneEl) { if (srcUrl && srcUrl.indexOf('blob:') === 0) URL.revokeObjectURL(srcUrl); return }

      var state = zoneStates[zoneId]
      if (!state) { if (srcUrl && srcUrl.indexOf('blob:') === 0) URL.revokeObjectURL(srcUrl); return }
      var url   = srcUrl

      state.dailyCounts[item.id]  = (state.dailyCounts[item.id] || 0) + 1
      state.lastPlayedAt[item.id] = Date.now()

      if (subName) {
        state.dailyCounts['sub_' + item.sub_playlist_id]  = (state.dailyCounts['sub_' + item.sub_playlist_id] || 0) + 1
        state.lastPlayedAt['sub_' + item.sub_playlist_id] = Date.now()
      }

      logPlayback(zoneId, item.id)
      persistCountsDebounced(zoneId)

      var isLocal = url && url.indexOf('blob:') === 0
      var label   = subName ? '[' + subName + '] ' + item.name.slice(0, 20) : item.name.slice(0, 28)
      var played  = state.dailyCounts[item.id]
      var cuota   = item.daily_frequency ? item.daily_frequency : '∞'
      log('▶ ' + label + '\n' + played + '/' + cuota + ' reproducciones' + (isLocal ? ' · 💾 local' : ''))
      dlog('Reproduciendo: ' + item.name + ' tipo=' + item.type + (isLocal ? ' (blob local)' : ' (red/externo)'), 'ok')

      // Limpiar el vigilante y la blob URL de la reproducción anterior.
      clearVideoWatchdog(zoneId)
      if (zoneObjectUrls[zoneId]) {
        URL.revokeObjectURL(zoneObjectUrls[zoneId])
        zoneObjectUrls[zoneId] = null
      }
      if (isLocal) zoneObjectUrls[zoneId] = url

      zoneEl.innerHTML = ''

      if (item.type === 'url') {
        var iframe          = document.createElement('iframe')
        iframe.src          = item.url || ''
        iframe.style.width  = '100%'
        iframe.style.height = '100%'
        iframe.style.border = 'none'
        iframe.allow        = 'autoplay; fullscreen; encrypted-media'
        iframe.setAttribute('allowfullscreen', '')
        zoneEl.appendChild(iframe)
        laterPlayNext(zoneId, gen, (item.duration_seconds || 30) * 1000)
      } else if (item.type === 'image') {
        var img     = document.createElement('img')
        img.style.objectFit = (state && state.fitMode) || 'cover'
        img.onload  = function() { laterPlayNext(zoneId, gen, (item.duration_seconds || 10) * 1000) }
        img.onerror = function() {
          dlog('Error cargando imagen: ' + (url || '').slice(0, 60), 'err')
          laterPlayNext(zoneId, gen, 500)
        }
        img.src = url
        zoneEl.appendChild(img)
      } else {
        var video         = document.createElement('video')
        video.muted       = true
        video.autoplay    = true
        video.playsInline = true
        video.style.objectFit = (state && state.fitMode) || 'cover'
        video.setAttribute('webkit-playsinline', '')
        video.setAttribute('disableremoteplayback', '')
        video.onended = function() { clearVideoWatchdog(zoneId); if (zoneAlive(zoneId, gen)) playNext(zoneId) }
        video.onerror = function() {
          dlog('Error reproduciendo video: ' + (url || '').slice(0, 60), 'err')
          clearVideoWatchdog(zoneId)
          laterPlayNext(zoneId, gen, 500)
        }
        video.src = url
        zoneEl.appendChild(video)
        video.play().catch(function(e) {
          dlog('video.play() rechazado: ' + e.message, 'warn')
        })
        armVideoWatchdog(zoneId, video, gen)
      }
    }

    // Vigilante anti-congelamiento: si un video queda "atascado" (el
    // currentTime no avanza) más de 8s mientras debería estar reproduciendo
    // — típico cuando se cae la red a mitad de un stream en vivo — se salta
    // al siguiente ítem en vez de dejar la pantalla congelada.
    function armVideoWatchdog(zoneId, videoEl, gen) {
      clearVideoWatchdog(zoneId)
      var lastTime     = -1
      var stalledSince = null
      zoneWatchdogs[zoneId] = setInterval(function() {
        if (!videoEl || videoEl.ended || videoEl.paused) return
        var t = videoEl.currentTime
        if (t === lastTime) {
          if (stalledSince === null) stalledSince = Date.now()
          else if (Date.now() - stalledSince > 8000) {
            dlog('Video atascado en zona ' + zoneId.slice(0,6) + ' → saltando', 'warn')
            clearVideoWatchdog(zoneId)
            if (zoneAlive(zoneId, gen)) playNext(zoneId)
            return
          }
        } else {
          stalledSince = null
        }
        lastTime = t
      }, 2000)
    }

    function clearVideoWatchdog(zoneId) {
      if (zoneWatchdogs[zoneId]) {
        clearInterval(zoneWatchdogs[zoneId])
        zoneWatchdogs[zoneId] = null
      }
    }

    function logPlayback(zoneId, contentId) {
      // Fuera del horario operativo NO se cuentan estadísticas (ni online ni en
      // el lote, para que no se sincronicen luego).
      if (!isWithinOperatingHours()) return
      // Batching: acumula en memoria (espejado a IndexedDB) — el envío real
      // ocurre en lotes cada 10 min / al volver online / al ocultar la app.
      addToBatch({
        screen_id: screenData.id, zone_id: zoneId, content_id: contentId,
        played_at: new Date().toISOString(),
      })
    }

    // ════════════════════════════════════════════════════════════
    //  LAYOUT
    // ════════════════════════════════════════════════════════════

    // Última estructura renderizada, para que softResync detecte si el layout
    // cambió (zonas añadidas/removidas/movidas/redimensionadas o dimensiones
    // del programa) y decida si reconstruir el DOM o solo refrescar contenido.
    var renderedProgram = null
    var renderedZones   = []

    function buildLayout(program, zones) {
      renderedProgram = { width: program.width, height: program.height }
      renderedZones   = zones.map(function(z) {
        return { id: z.id, x: z.x, y: z.y, width: z.width, height: z.height, background_color: z.background_color || '' }
      })
      screenEl.innerHTML = ''
      var screenW    = window.screen.width
      var screenH    = window.screen.height
      var exactMatch = (screenW === program.width && screenH === program.height)

      var container              = document.createElement('div')
      container.id               = 'program-container'
      container.style.position   = 'absolute'
      container.style.background = '#000'
      container.style.width      = program.width  + 'px'
      container.style.height     = program.height + 'px'

      if (exactMatch) {
        container.style.left      = '0px'
        container.style.top       = '0px'
        container.style.transform = 'none'
        dlog('Layout: modo exacto ' + program.width + '×' + program.height, 'ok')
      } else {
        var scale   = Math.min(window.innerWidth / program.width, window.innerHeight / program.height)
        var offsetX = (window.innerWidth  - program.width  * scale) / 2
        var offsetY = (window.innerHeight - program.height * scale) / 2
        container.style.left            = offsetX + 'px'
        container.style.top             = offsetY + 'px'
        container.style.transformOrigin = 'top left'
        container.style.transform       = 'scale(' + scale + ')'
        dlog('Layout: escala ' + scale.toFixed(3) + ' (pantalla ' + screenW + '×' + screenH + ' vs ' + program.width + '×' + program.height + ')', 'ok')
      }

      for (var i = 0; i < zones.length; i++) {
        var zone             = zones[i]
        var div              = document.createElement('div')
        div.className        = 'zone'
        div.id               = 'zone-' + zone.id
        div.style.left       = zone.x      + 'px'
        div.style.top        = zone.y      + 'px'
        div.style.width      = zone.width  + 'px'
        div.style.height     = zone.height + 'px'
        div.style.background = zone.background_color || '#000'
        container.appendChild(div)
      }
      screenEl.appendChild(container)
      dlog('Zonas creadas: ' + zones.length, 'ok')
    }

    // ════════════════════════════════════════════════════════════
    //  HEARTBEAT
    // ════════════════════════════════════════════════════════════

    function startHeartbeat() {
      function beat() {
        if (!sb || !screenData) return
        sb.from('screens')
          .update({ last_heartbeat: new Date().toISOString() })
          .eq('id', screenData.id)
          // Piggyback: el UPDATE ya devuelve la fila (return=representation),
          // así que leer la huella aquí cuesta CERO requests extra.
          .select('device_fingerprint')
          .then(function(res) {
            if (res.error) { dlog('Heartbeat error: ' + res.error.message, 'warn'); return }
            dlog('Heartbeat OK', 'ok')
            var row = (res.data && res.data.length) ? res.data[0] : null
            if (row) checkDeviceStillOwner(row.device_fingerprint || null)
          })
      }
      beat()
      setInterval(beat, 30000)
    }

    // ════════════════════════════════════════════════════════════
    //  POLLING
    // ════════════════════════════════════════════════════════════

    function startPolling() {
      setInterval(async function() {
        if (!sb || !screenData || !screenData.current_program_id) return
        try {
          var res = await sb.from('programs')
            .select('published_at, updated_at')
            .eq('id', screenData.current_program_id)
            .single()

          if (res.error) throw new Error(res.error.message)

          if (!isOnline) {
            setConnStatus(true)
            dlog('Reconectado — recargando conteos...', 'ok')
            var saved = await loadCounts()
            Object.keys(zoneStates).forEach(function(zoneId) {
              Object.keys(saved.counts).forEach(function(contentId) {
                var current = zoneStates[zoneId].dailyCounts[contentId] || 0
                if (saved.counts[contentId] > current) {
                  zoneStates[zoneId].dailyCounts[contentId]  = saved.counts[contentId]
                  zoneStates[zoneId].lastPlayedAt[contentId] = saved.lastPlayed[contentId] || 0
                }
              })
              persistCountsDebounced(zoneId)
            })
          }

          if (res.data) {
            var latest = res.data.published_at
            if (lastPublishedAt === null) { lastPublishedAt = latest }
            else if (latest && latest !== lastPublishedAt) {
              dlog('Nueva publicación detectada → resync suave', 'ok')
              await softResync()
              return
            }
          }

          // Cambios de la pantalla (horario operativo) NO tocan programs, así
          // que se vigilan aparte y se aplican en caliente sin recargar ni
          // requerir re-publicar la zona.
          await checkScreenSettingsChange()
        } catch(e) {
          if (isOnline) {
            setConnStatus(false)
            dlog('Polling falló: ' + e.message, 'err')
          }
        }
      }, 15000)
    }

    // Relee el horario operativo de la pantalla y, si cambió, lo aplica al
    // instante: actualiza screenData, refresca el snapshot y transiciona
    // pantalla negra ↔ reproducción según corresponda.
    function checkScreenSettingsChange() {
      return sb.from('screens')
        .select('operating_start, operating_end, operating_hours')
        .eq('id', screenData.id)
        .single()
        .then(function(r) {
          if (r.error || !r.data) return
          var newStart = r.data.operating_start || null
          var newEnd   = r.data.operating_end   || null
          var curStart = screenData.operating_start || null
          var curEnd   = screenData.operating_end   || null
          if (newStart === curStart && newEnd === curEnd) return

          dlog('Horario operativo actualizado: ' +
               (newStart || '—') + ' a ' + (newEnd || '—') + ' → aplicando', 'ok')
          screenData.operating_start = newStart
          screenData.operating_end   = newEnd
          if (r.data.operating_hours != null) screenData.operating_hours = r.data.operating_hours
          persistScreenMeta()
          applyOperatingState()
        }, function() { /* fallo silencioso: se reintenta en el próximo ciclo */ })
    }

    // ════════════════════════════════════════════════════════════
    //  REALTIME (con fallback silencioso si falla)
    // ════════════════════════════════════════════════════════════

    function subscribeToChanges() {
      try {
        sb.channel('player-' + screenData.id)
          .on('postgres_changes', {
            event: 'UPDATE', schema: 'public', table: 'programs',
            filter: 'id=eq.' + screenData.current_program_id
          }, function() {
            dlog('Realtime: cambio detectado → resync suave', 'ok')
            softResync()
          })
          .subscribe(function(status) {
            dlog('Realtime status: ' + status, status === 'SUBSCRIBED' ? 'ok' : 'warn')
          })
      } catch(e) {
        dlog('Realtime no disponible: ' + e.message + ' (polling activo como respaldo)', 'warn')
      }
    }

    // ════════════════════════════════════════════════════════════
    //  CONEXIÓN
    // ════════════════════════════════════════════════════════════

    function watchConnection() {
      window.addEventListener('online',  function() { setConnStatus(true);  dlog('Evento: online', 'ok') })
      window.addEventListener('offline', function() { setConnStatus(false); dlog('Evento: offline', 'err') })
      setConnStatus(navigator.onLine)
    }

    // ════════════════════════════════════════════════════════════
    //  CARGA DE PROGRAMA
    //  Intenta cargar en vivo desde Supabase; si falla o no hay
    //  conexión, usa el último snapshot guardado en IndexedDB para
    //  seguir reproduciendo sin interrupción.
    // ════════════════════════════════════════════════════════════

    // Construye las entradas (items directos + sub-playlists ordenadas) de una zona.
    async function fetchZoneEntries(zone) {
      var itemsRes = await sb.from('media_content').select('*')
        .eq('zone_id', zone.id).is('sub_playlist_id', null).is('archived_at', null).order('sort_order')
      var subsRes  = await sb.from('sub_playlists').select('*')
        .eq('zone_id', zone.id).is('archived_at', null).order('sort_order')

      if (itemsRes.error) dlog('Error cargando media zona ' + zone.id.slice(0,8) + ': ' + itemsRes.error.message, 'err')
      if (subsRes.error)  dlog('Error cargando sub-playlists: ' + subsRes.error.message, 'err')

      var subs       = subsRes.data || []
      var subEntries = []
      for (var j = 0; j < subs.length; j++) {
        var sub   = subs[j]
        var siRes = await sb.from('media_content').select('*')
          .eq('sub_playlist_id', sub.id).is('archived_at', null).order('sort_order')
        if (siRes.error) dlog('Error sub-playlist ' + sub.id.slice(0,8) + ': ' + siRes.error.message, 'err')
        subEntries.push({ kind: 'sub', sub: sub, items: siRes.data || [], subIndex: 0 })
      }

      var directEntries = (itemsRes.data || []).map(function(item) {
        return { kind: 'item', item: item, sort_order: item.sort_order }
      })
      var subEntriesOrdered = subEntries.map(function(e) {
        return Object.assign({}, e, { sort_order: e.sub.sort_order })
      })
      var combined = directEntries.concat(subEntriesOrdered)
      combined.sort(function(a, b) { return a.sort_order - b.sort_order })
      return combined
    }

    // Trae en vivo desde Supabase el programa, sus zonas, contadores y
    // entradas de cada zona. Lanza excepción si algo falla. Reutilizado por
    // loadProgram (arranque) y softResync (recarga suave sin reload).
    async function fetchProgramData() {
      var progRes = await sb.from('programs').select('*').eq('id', screenData.current_program_id).single()
      if (progRes.error) throw new Error(progRes.error.message)
      var program = progRes.data

      var zonesRes = await sb.from('zones').select('*').eq('program_id', program.id).order('sort_order')
      if (zonesRes.error) throw new Error(zonesRes.error.message)
      var zones = zonesRes.data || []

      var remoteCounts = await loadCounts()

      var zoneEntriesMap = {}
      for (var i = 0; i < zones.length; i++) {
        zoneEntriesMap[zones[i].id] = await fetchZoneEntries(zones[i])
        dlog('Zona ' + zones[i].id.slice(0,8) + ': ' + zoneEntriesMap[zones[i].id].length + ' entradas', 'ok')
      }
      return { program: program, zones: zones, zoneEntriesMap: zoneEntriesMap, remoteCounts: remoteCounts }
    }

    async function loadProgram() {
      if (!screenData.current_program_id) {
        dlog('Sin programa asignado a esta pantalla', 'warn')
        log('⚠ Sin programa asignado')
        return
      }

      log('Cargando programa...')

      var program        = null
      var zones           = []
      var zoneEntriesMap  = {}
      var onlineLoadOk    = false
      var remoteCounts    = { counts: {}, lastPlayed: {} }

      if (isOnline) {
        try {
          log('Cargando historial de reproducciones...')
          var data = await fetchProgramData()
          program        = data.program
          zones          = data.zones
          zoneEntriesMap = data.zoneEntriesMap
          remoteCounts   = data.remoteCounts
          dlog('Programa OK: ' + program.name, 'ok')

          if (!zones.length) {
            dlog('El programa no tiene zonas configuradas', 'warn')
            log('⚠ Sin zonas')
            return
          }
          dlog('Zonas cargadas: ' + zones.length, 'ok')

          lastPublishedAt = program.published_at || program.updated_at
          onlineLoadOk    = true
          persistSnapshot(program, zones, zoneEntriesMap)
        } catch(e) {
          dlog('Carga online falló (' + e.message + ') → usando snapshot local', 'warn')
          onlineLoadOk = false
        }
      }

      if (!onlineLoadOk) {
        log('Sin conexión · cargando última lista guardada...')
        var metaRow = await idbGet('meta', 'state').catch(function() { return null })
        if (!metaRow || metaRow.screenId !== screenData.id || !metaRow.program) {
          log('⚠ Sin lista guardada — esperando conexión')
          dlog('No hay snapshot local utilizable para esta pantalla', 'err')
          setTimeout(loadProgram, 5000)
          return
        }
        var zoneRows = await idbGetAll('zones').catch(function() { return [] })
        if (!zoneRows.length) {
          log('⚠ Snapshot sin zonas — esperando conexión')
          setTimeout(loadProgram, 5000)
          return
        }
        program         = metaRow.program
        lastPublishedAt = metaRow.publishedAt
        zones           = zoneRows.map(function(r) { return r.zone })
        zoneRows.forEach(function(r) { zoneEntriesMap[r.zoneId] = r.entries })
        dlog('Snapshot local cargado: ' + zones.length + ' zona(s) (modo offline)', 'ok')
      }

      var localCountsRows = await idbGetAll('counts').catch(function() { return [] })
      var localCountsMap  = {}
      localCountsRows.forEach(function(r) { localCountsMap[r.zoneId] = r })

      zones.forEach(function(zone) {
        var lc = localCountsMap[zone.id]
        zoneStates[zone.id] = {
          entries:      zoneEntriesMap[zone.id] || [],
          dailyCounts:  Object.assign({}, lc ? lc.dailyCounts  : {}, remoteCounts.counts),
          lastPlayedAt: Object.assign({}, lc ? lc.lastPlayedAt : {}, remoteCounts.lastPlayed),
          currentIndex: 0,
          startTime:    Date.now(),
          fitMode:      zone.fit_mode || 'cover',
          gen:          0,
        }
      })

      buildLayout(program, zones)

      if (onlineLoadOk) enqueueAllMedia(zoneEntriesMap)

      for (var k = 0; k < zones.length; k++) {
        (function(zoneId, delay) {
          setTimeout(function() {
            if (zoneStates[zoneId].entries.length > 0) {
              playNext(zoneId)
            } else {
              dlog('Zona ' + zoneId.slice(0,8) + ' sin contenido — sin reproducción', 'warn')
            }
          }, delay)
        })(zones[k].id, k * 300)
      }

      log('▶ ' + program.name + ' · ' + zones.length + ' zona(s) · ' + (screenData.operating_hours || 20) + 'h/día' + (onlineLoadOk ? '' : ' · modo offline'))
      dlog('Player iniciado: ' + program.name + (onlineLoadOk ? '' : ' (desde snapshot local)'), 'ok')

      // Ya hay contenido en pantalla: oculta indicadores de estado/conexión.
      document.body.classList.remove('booting')
    }

    // ════════════════════════════════════════════════════════════
    //  RESINCRONIZACIÓN SUAVE (sin window.location.reload)
    //
    //  Al detectar una nueva publicación, en vez de recargar toda la página
    //  (lo que re-descargaba TODA la biblioteca), se refresca la playlist en
    //  caliente:
    //    · Se descargan SOLO los videos nuevos (los ya cacheados no se tocan).
    //    · Se purga del caché solo lo que ya no está en la playlist.
    //    · Si el layout no cambió, las zonas siguen reproduciendo sin corte y
    //      toman el contenido nuevo en su próxima transición natural.
    //    · Si el layout cambió, se reconstruye el DOM y se reinician las
    //      cadenas (la generación mata las viejas para evitar doble reproducción).
    // ════════════════════════════════════════════════════════════

    var resyncing = false

    // ¿Cambió la estructura visual respecto a lo último renderizado?
    function layoutChanged(program, newZones) {
      if (!renderedProgram) return true
      if (renderedProgram.width !== program.width || renderedProgram.height !== program.height) return true
      if (renderedZones.length !== newZones.length) return true
      var byId = {}
      renderedZones.forEach(function(z) { byId[z.id] = z })
      for (var i = 0; i < newZones.length; i++) {
        var n = newZones[i], o = byId[n.id]
        if (!o) return true
        if (o.x !== n.x || o.y !== n.y || o.width !== n.width || o.height !== n.height) return true
        if ((o.background_color || '') !== (n.background_color || '')) return true
      }
      return false
    }

    async function softResync() {
      if (resyncing) return
      if (!isOnline || !sb || !screenData || !screenData.current_program_id) return
      resyncing = true
      try {
        var data
        try {
          data = await fetchProgramData()
        } catch (e) {
          dlog('Resync falló (' + e.message + '), se reintentará en el próximo ciclo', 'warn')
          return
        }
        if (!data.zones.length) { dlog('Resync: programa sin zonas, ignorado', 'warn'); return }

        var program        = data.program
        var newZones       = data.zones
        var zoneEntriesMap = data.zoneEntriesMap

        lastPublishedAt = program.published_at || program.updated_at
        persistSnapshot(program, newZones, zoneEntriesMap)

        var changed = layoutChanged(program, newZones)
        dlog('Resync suave: ' + (changed ? 'layout cambió → reconstruyendo DOM' : 'solo contenido → sin cortar reproducción'), 'ok')
        log('🔄 Actualizando contenido...')

        // Si el layout cambia, invalidar las cadenas actuales (nueva generación)
        // y limpiar sus recursos antes de reconstruir.
        if (changed) {
          Object.keys(zoneStates).forEach(function(zid) {
            zoneStates[zid].gen = (zoneStates[zid].gen || 0) + 1
            clearVideoWatchdog(zid)
            if (zoneObjectUrls[zid]) { URL.revokeObjectURL(zoneObjectUrls[zid]); zoneObjectUrls[zid] = null }
          })
        }

        // Crear/actualizar estados de zona preservando contadores del día.
        var newIds = {}
        newZones.forEach(function(zone) {
          newIds[zone.id] = true
          var prev = zoneStates[zone.id]
          zoneStates[zone.id] = {
            entries:      zoneEntriesMap[zone.id] || [],
            dailyCounts:  prev ? prev.dailyCounts  : Object.assign({}, data.remoteCounts.counts),
            lastPlayedAt: prev ? prev.lastPlayedAt : Object.assign({}, data.remoteCounts.lastPlayed),
            currentIndex: prev ? prev.currentIndex : 0,
            startTime:    prev ? prev.startTime : Date.now(),
            fitMode:      zone.fit_mode || 'cover',
            gen:          prev ? prev.gen : 0,   // ya incrementado arriba si changed
          }
        })

        // Eliminar zonas que ya no existen (matar sus cadenas + limpiar).
        Object.keys(zoneStates).forEach(function(zid) {
          if (!newIds[zid]) {
            zoneStates[zid].gen = (zoneStates[zid].gen || 0) + 1
            clearVideoWatchdog(zid)
            if (zoneObjectUrls[zid]) { URL.revokeObjectURL(zoneObjectUrls[zid]); zoneObjectUrls[zid] = null }
            delete zoneStates[zid]
          }
        })

        // Descargar SOLO lo nuevo y purgar del caché lo que ya no se use.
        enqueueAllMedia(zoneEntriesMap)

        if (changed) {
          buildLayout(program, newZones)
          // Arrancar cadenas nuevas (una por zona) con la generación vigente.
          newZones.forEach(function(zone, idx) {
            (function(zoneId, delay) {
              setTimeout(function() {
                if (operatingActive && zoneStates[zoneId] && zoneStates[zoneId].entries.length > 0) playNext(zoneId)
              }, delay)
            })(zone.id, idx * 300)
          })
        }
        // Si NO cambió el layout: las cadenas existentes siguen vivas y toman
        // las nuevas entries en su próximo getNextItem. No arrancamos nada
        // nuevo → sin reproducción doble.

        log('▶ ' + program.name + ' · ' + newZones.length + ' zona(s)')
      } finally {
        resyncing = false
      }
    }

    // ════════════════════════════════════════════════════════════
    //  INICIO DEL PLAYER
    // ════════════════════════════════════════════════════════════

    async function startPlayer(token) {
      log('Identificando pantalla...')
      dlog('Buscando pantalla con token: ' + token.slice(0,12) + '...', 'info')

      var res
      try {
        res = await sb.from('screens').select('*').eq('device_token', token).single()
      } catch(e) {
        dlog('Excepción en consulta screens: ' + e.message, 'err')
        log('❌ Error de red consultando pantalla')
        return
      }

      if (res.error) {
        dlog('Error Supabase screens: ' + res.error.message + ' | code=' + res.error.code + ' | details=' + JSON.stringify(res.error.details), 'err')
        log('❌ Pantalla no encontrada · recarga la página')
        lsDel('device_token')
        return
      }

      screenData = res.data
      dlog('Pantalla identificada: ' + screenData.name + ' (id=' + screenData.id.slice(0,8) + ')', 'ok')
      log('✓ ' + screenData.name)

      // ── DEVICE LOCKING: un token, un dispositivo ──────────────────
      // Estamos online (la consulta de screens funcionó). Comparamos la
      // huella de este equipo con la registrada en la pantalla.
      var allowed = await enforceDeviceLock()
      if (!allowed) {
        dlog('Acceso bloqueado: token activo en otro dispositivo', 'err')
        showDeviceLockScreen()
        return   // no reproducir, no seguir intentando
      }

      watchConnection()
      startHeartbeat()
      startDeviceSeenWatch()  // actualiza last_seen_at cada 5 min
      startPolling()
      subscribeToChanges()
      startEventSync()
      initOperatingState()   // define operatingActive + pantalla negra si aplica
      await loadProgram()    // el primer playNext ya respeta operatingActive
      startOperatingWatch()  // vigila la ventana horaria cada 30s
    }

    // ── Despareo remoto ("Liberar dispositivo" desde el panel) ─────
    // deviceLockClaimed: true solo cuando este equipo confirmó ser el dueño
    // del token (reclamó la pantalla o su huella coincide). Sin este flag,
    // un fail-open (huella no registrada por red/RLS) se desparearía en
    // bucle al ver NULL en la base.
    var deviceLockClaimed = false
    var unpairing         = false

    // Llamado desde el heartbeat (piggyback en la respuesta que YA llega:
    // cero requests extra). Si el panel liberó la pantalla (huella NULL) u
    // otro equipo la reclamó (huella distinta), este player se desparea:
    // detiene todo, borra el token local y reinicia hacia la pantalla de
    // vinculación (QR). El reload es un evento único disparado por acción
    // del admin — mismo camino que el botón manual "cambiar pantalla" — y
    // con el caché en IndexedDB no re-descarga ningún video.
    function checkDeviceStillOwner(dbFingerprint) {
      if (!deviceLockClaimed || unpairing) return
      var localId = lsGet('device_id')
      if (!localId) return
      if (dbFingerprint === localId) return   // seguimos siendo los dueños
      unpairing = true
      dlog('Dispositivo liberado desde el panel → volviendo a vinculación', 'warn')
      log('🔓 Pantalla liberada · re-vinculación...')
      stopAllZonesPlayback()
      lsDel('device_token')
      setTimeout(function() { location.reload() }, 800)
    }

    // Devuelve true si este dispositivo puede usar el token, false si está
    // bloqueado. Reclama la pantalla si aún no tiene dueño.
    async function enforceDeviceLock() {
      var deviceId
      try {
        deviceId = await getDeviceId()
      } catch (e) {
        // Sin fingerprint no arriesgamos a bloquear un equipo legítimo: se
        // permite (fail-open). El locking es una barrera, no una cárcel.
        dlog('No se pudo calcular fingerprint: ' + e.message + ' → acceso permitido', 'warn')
        return true
      }

      var stored = screenData.device_fingerprint || null

      if (!stored) {
        // Primer dispositivo: reclama la pantalla.
        dlog('Pantalla sin dueño → registrando este dispositivo', 'ok')
        var r = await sb.from('screens')
          .update({ device_fingerprint: deviceId, last_seen_at: new Date().toISOString() })
          .eq('id', screenData.id)
        if (r && r.error) {
          // Si no se pudo registrar (RLS/red), permitimos igualmente para no
          // dejar la pantalla muerta; el próximo arranque reintentará.
          // OJO: deviceLockClaimed queda en false → el despareo remoto no
          // actúa (evita desparearse en bucle sin ser dueño confirmado).
          dlog('No se pudo registrar fingerprint: ' + r.error.message + ' → acceso permitido', 'warn')
        } else {
          screenData.device_fingerprint = deviceId
          deviceLockClaimed = true
        }
        return true
      }

      if (stored === deviceId) {
        dlog('Dispositivo reconocido (mismo equipo) → acceso permitido', 'ok')
        deviceLockClaimed = true
        return true
      }

      // Huella distinta → otro equipo ya tiene el token.
      return false
    }

    // Actualiza last_seen_at del dueño cada 5 minutos (además del heartbeat
    // de 30s que marca last_heartbeat). Sirve para saber cuándo se vio por
    // última vez al dispositivo dueño del token.
    function startDeviceSeenWatch() {
      function seen() {
        if (!sb || !screenData) return
        sb.from('screens')
          .update({ last_seen_at: new Date().toISOString() })
          .eq('id', screenData.id)
          .then(function () {}, function () {})
      }
      seen()
      setInterval(seen, 5 * 60 * 1000)
    }

    // ════════════════════════════════════════════════════════════
    //  ARRANQUE
    // ════════════════════════════════════════════════════════════

    async function init() {
      runEnvCheck()

      if (!sb) {
        log('❌ Supabase no disponible')
        dlog('No se puede continuar sin Supabase', 'err')
        return
      }

      var token = getDeviceToken()

      if (!token) {
        document.getElementById('token-screen').style.display = 'flex'
        startQRPairing()

        document.getElementById('token-btn').addEventListener('click', async function() {
          var input = document.getElementById('token-input').value.trim()
          if (!input) return

          document.getElementById('token-btn').textContent = 'Conectando...'
          document.getElementById('token-error').style.display = 'none'
          dlog('Verificando token ingresado: ' + input.slice(0,12) + '...', 'info')

          var res
          try {
            res = await sb.from('screens').select('id, name').eq('device_token', input).single()
          } catch(e) {
            dlog('Error verificando token: ' + e.message, 'err')
            document.getElementById('token-error').style.display = 'block'
            document.getElementById('token-btn').textContent = 'Conectar pantalla'
            return
          }

          if (res.error || !res.data) {
            dlog('Token inválido: ' + (res.error ? res.error.message : 'sin datos'), 'err')
            document.getElementById('token-error').style.display = 'block'
            document.getElementById('token-btn').textContent = 'Conectar pantalla'
            return
          }

          dlog('Token válido: ' + res.data.name, 'ok')
          lsSet('device_token', input)
          document.getElementById('token-screen').style.display = 'none'
          document.getElementById('screen').style.display = 'block'
          await startPlayer(input)
        })

        document.getElementById('token-input').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') document.getElementById('token-btn').click()
        })
        return
      }

      document.getElementById('token-screen').style.display = 'none'
      document.getElementById('screen').style.display = 'block'
      await startPlayer(token)
    }

    // ════════════════════════════════════════════════════════════
    //  CONEXIÓN POR QR
    // ════════════════════════════════════════════════════════════

    var qrCode     = null
    var qrInterval = null

    var PAIR_BASE_URL = (
      window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1' ||
      window.location.hostname === ''
    ) ? 'https://gestorplayer.vercel.app' : window.location.origin

    async function startQRPairing() {
      qrCode = Math.random().toString(36).substring(2, 8).toUpperCase()

      try {
        var res = await sb.from('device_pairings').insert({ code: qrCode, token: null })
        if (res.error) throw new Error(res.error.message)
      } catch(e) {
        document.getElementById('qr-loading').textContent = 'Error creando código: ' + e.message
        return
      }

      var pairUrl = PAIR_BASE_URL + '/pair?code=' + qrCode
      dlog('QR URL: ' + pairUrl, 'info')
      document.getElementById('qr-img').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=160x160&ecc=M&data=' + encodeURIComponent(pairUrl)
      document.getElementById('qr-loading').style.display = 'none'
      document.getElementById('qr-ready').style.display   = 'block'

      qrInterval = setInterval(async function() {
        var r = await sb.from('device_pairings').select('token').eq('code', qrCode).single()
        if (r.data && r.data.token) {
          clearInterval(qrInterval)
          var token = r.data.token
          sb.from('device_pairings').delete().eq('code', qrCode)
          document.getElementById('qr-status').textContent = '✅ ¡Conectado! Arrancando...'
          document.getElementById('qr-status').style.color = '#10B981'
          lsSet('device_token', token)
          setTimeout(function() {
            document.getElementById('token-screen').style.display = 'none'
            document.getElementById('screen').style.display = 'block'
            startPlayer(token)
          }, 1200)
        }
      }, 2000)
    }

    init()
  </script>
</body>
</html>
